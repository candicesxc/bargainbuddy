<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BargainBuddy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f0f0f; color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh; max-width: 480px; margin: 0 auto; padding: 20px;
    }
    .screen { width: 100%; }
    button {
      min-height: 48px; padding: 12px 24px; border-radius: 12px;
      border: none; font-size: 16px; cursor: pointer; width: 100%; margin-top: 12px;
    }
    .btn-primary { background: #22c55e; color: #000; font-weight: 600; }
    .btn-secondary { background: #1f1f1f; color: #fff; border: 1px solid #333; }
    .btn-danger { background: #ef4444; color: #fff; }
    .tone-group { display: flex; gap: 8px; margin-top: 8px; }
    .tone-btn { background: #1f1f1f; border: 1px solid #333; color: #aaa; flex: 1; }
    .tone-btn.active { background: #22c55e; color: #000; border-color: #22c55e; font-weight: 600; }
    .location-pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: #1f1f1f; border: 1px solid #333; border-radius: 20px;
      padding: 6px 12px; font-size: 13px; color: #aaa; margin-bottom: 16px; cursor: pointer;
    }
    .live-dot {
      width: 10px; height: 10px; border-radius: 50%; background: #ef4444;
      animation: pulse 1.2s ease-in-out infinite; display: inline-block; margin-right: 6px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
    .transcript {
      background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
      padding: 16px; height: 280px; overflow-y: auto;
      font-size: 14px; line-height: 1.6; color: #ddd; margin-top: 16px;
    }
    .badge-high { background: #3f1515; color: #ef4444; border-radius: 8px; padding: 4px 10px; font-size: 12px; }
    .badge-low  { background: #0f2b1a; color: #22c55e; border-radius: 8px; padding: 4px 10px; font-size: 12px; }
    .badge-medium { background: #2b2010; color: #f59e0b; border-radius: 8px; padding: 4px 10px; font-size: 12px; }
    .card {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 16px; padding: 20px; margin-bottom: 16px;
    }
    input, select {
      width: 100%; background: #1a1a1a; border: 1px solid #333;
      color: #fff; border-radius: 10px; padding: 12px 16px; font-size: 16px; margin-top: 8px;
    }
    #camera-viewfinder { width: 100%; aspect-ratio: 3/4; background: #000; border-radius: 16px; object-fit: cover; margin-bottom: 16px; }
    .preview-img { width: 100%; border-radius: 16px; margin-bottom: 16px; }
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-content { background: #1a1a1a; padding: 20px; border-radius: 16px; width: 90%; max-width: 400px; }
  </style>
</head>
<body>
  <div id="screen-location" class="screen"></div>
  <div id="screen-capture" class="screen" style="display:none;"></div>
  <div id="screen-analysis" class="screen" style="display:none;"></div>
  <div id="screen-preferences" class="screen" style="display:none;"></div>
  <div id="screen-negotiation" class="screen" style="display:none;"></div>
  <div id="screen-result" class="screen" style="display:none;"></div>

  <div id="location-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Change Location</h3>
      <input type="text" id="modal-location-input" placeholder="Mumbai, India">
      <select id="modal-language-select"></select>
      <button id="modal-update-btn" class="btn-primary">Update</button>
      <button id="modal-close-btn" class="btn-secondary">Cancel</button>
    </div>
  </div>

  <script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  var CONFIG = {
    GEMINI_API_KEY: 'YOUR_API_KEY_HERE'
  };

  // ─── APP STATE ────────────────────────────────────────────────────────────
  var state = {
    location: null,
    detectedLanguage: null,
    analysis: null,
    imageBase64: null,
    imageMimeType: null,
    productDescription: '',
    maxPrice: null,
    tone: 'friendly',
    voice: 'Puck',
    outcome: null,
    finalPrice: null,
  };

  var LANGUAGES = [
    'Auto-detect',
    'Thai', 'Japanese', 'Mandarin Chinese', 'Korean',
    'Arabic', 'Moroccan Arabic (Darija)', 'Turkish', 'Hindi',
    'Vietnamese', 'Indonesian (Bahasa)', 'Khmer', 'Nepali',
    'Spanish', 'Portuguese', 'French', 'Italian',
    'German', 'Russian', 'Swahili', 'English'
  ];

  // ─── SCREEN ROUTER ────────────────────────────────────────────────────────
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(function(s) { s.style.display = 'none'; });
    document.getElementById('screen-' + name).style.display = 'block';
    switch (name) {
      case 'location':    initLocationScreen();    break;
      case 'capture':     initCaptureScreen();     break;
      case 'analysis':    initAnalysisScreen();    break;
      case 'preferences': initPreferencesScreen(); break;
      case 'negotiation': initNegotiationScreen(); break;
      case 'result':      initResultScreen();      break;
    }
  }

  function renderLocationPill(container) {
    if (!state.location) return;
    var pill = document.createElement('div');
    pill.className = 'location-pill';
    pill.innerHTML = '📍 ' + (state.location.city || state.location.country) + ' · ' + state.detectedLanguage + ' ✏️';
    pill.onclick = openLocationModal;
    container.prepend(pill);
  }

  function openLocationModal() {
    var modal = document.getElementById('location-modal');
    var input = document.getElementById('modal-location-input');
    var select = document.getElementById('modal-language-select');
    input.value = state.location.city + ', ' + state.location.country;
    select.innerHTML = '';
    LANGUAGES.forEach(function(lang) {
      var opt = document.createElement('option');
      opt.value = lang; opt.textContent = lang;
      if (lang === state.detectedLanguage) opt.selected = true;
      select.appendChild(opt);
    });
    modal.style.display = 'flex';
  }

  document.getElementById('modal-close-btn').onclick = function() {
    document.getElementById('location-modal').style.display = 'none';
  };

  document.getElementById('modal-update-btn').onclick = function() {
    var locStr = document.getElementById('modal-location-input').value;
    var lang = document.getElementById('modal-language-select').value;
    var parts = locStr.split(',').map(function(s) { return s.trim(); });
    state.location = { city: parts[0] || '', country: parts[1] || '' };
    state.detectedLanguage = lang;
    document.getElementById('location-modal').style.display = 'none';
    if (document.getElementById('screen-analysis').style.display === 'block') {
      initAnalysisScreen();
    } else {
      var cur = document.querySelector('.screen[style*="display: block"]');
      if (cur) showScreen(cur.id.replace('screen-', ''));
    }
  };

  // ─── GEMINI VISION (direct REST) ─────────────────────────────────────────
  async function analyzeProduct(base64Image, mimeType, location, productDescription) {
    var apiKey = (window.CONFIG || CONFIG).GEMINI_API_KEY;
    if (!apiKey || apiKey.includes('PASTE')) throw new Error('Invalid API Key');

    var prompt = 'You are an expert local street-market appraiser in ' + location.city + ', ' + location.country + '.\n' +
      'The user describes this item as: "' + productDescription + '"\n\n' +
      'STEP 1 — Read the price tag: Look carefully at the image for any visible price tag, price sticker, handwritten price, or label showing a price. If you can see a price in the image, extract it exactly as written and use it as "quoted_price".\n\n' +
      'STEP 2 — If no price is visible: Estimate the price a merchant in ' + location.city + ' would first quote to a foreign tourist for this specific type of item.\n\n' +
      'STEP 3 — Determine the fair price: Based on what locals actually pay (not the tourist ask), provide "suggested_usd" as the fair market value in USD using current realistic exchange rates for ' + location.country + '.\n\n' +
      'Return ONLY valid JSON with no markdown or backticks:\n' +
      '{\n' +
      '  "product_description": "Detailed description of the product",\n' +
      '  "quoted_price": "The price shown in the image or estimated tourist ask if not visible",\n' +
      '  "quoted_currency": "Local currency code (e.g. INR, THB, JPY)",\n' +
      '  "quoted_price_usd": <USD equivalent as a realistic number>,\n' +
      '  "suggested_usd": <fair local market price in USD as a realistic number>,\n' +
      '  "suggested_local": "Fair price in local currency (e.g. 350 INR)",\n' +
      '  "local_context": "One sentence about typical pricing for this item in ' + location.city + '.",\n' +
      '  "reasoning": "One sentence explaining the price difference.",\n' +
      '  "negotiation_floor": <absolute lowest a local vendor would accept in USD>,\n' +
      '  "tourist_markup": "low | medium | high"\n' +
      '}\n\n' +
      'IMPORTANT: All USD values must reflect real-world prices. Use current exchange rates. Do not use placeholder or example values.';

    var response = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { inlineData: { mimeType: mimeType || 'image/jpeg', data: base64Image } },
            { text: prompt }
          ]}]
        })
      }
    );

    var data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error');
    var text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    var jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AI returned unreadable format');
    return JSON.parse(jsonMatch[0]);
  }

  // ─── GEMINI LIVE (WebSocket) ──────────────────────────────────────────────
  var LIVE_WS_URL = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent';

  async function startNegotiation(negotiationState, onTranscript, onDone) {
    var apiKey = (window.CONFIG || CONFIG).GEMINI_API_KEY;
    if (!apiKey || apiKey.includes('PASTE')) throw new Error('Invalid API Key');

    var micStream, captureCtx, playbackCtx, micSource, processor, ws;
    var isMuted = false, sessionEnded = false;
    var playbackQueue = Promise.resolve();

    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    captureCtx = new AudioContext({ sampleRate: 16000 });
    await captureCtx.resume();
    playbackCtx = new AudioContext({ sampleRate: 24000 });
    await playbackCtx.resume();

    return new Promise(function(resolve, reject) {
      ws = new WebSocket(LIVE_WS_URL + '?key=' + apiKey);
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        ws.send(JSON.stringify({
          setup: {
            model: 'models/gemini-2.5-flash-native-audio-latest',
            systemInstruction: { parts: [{ text: buildSystemPrompt(negotiationState) }] },
            generationConfig: { responseModalities: ['AUDIO'] }
          }
        }));
      };

      ws.onmessage = function(event) {
        var msg;
        try {
          var text = event.data instanceof ArrayBuffer
            ? new TextDecoder().decode(event.data)
            : event.data;
          msg = JSON.parse(text);
        } catch(e) { console.error('WS parse error:', e); return; }

        if (msg.setupComplete) {
          startMicCapture();
          var lang = negotiationState.detectedLanguage === 'Auto-detect' ? 'the local language' : negotiationState.detectedLanguage;
          ws.send(JSON.stringify({
            clientContent: {
              turns: [{ role: 'user', parts: [{ text: 'Begin the negotiation now in ' + lang + '. Make your opening offer immediately.' }] }],
              turnComplete: true
            }
          }));
          resolve({ stop: stopEverything, mute: function(val) { isMuted = val; } });
          return;
        }

        var parts = (msg.serverContent && msg.serverContent.modelTurn && msg.serverContent.modelTurn.parts) || [];
        parts.forEach(function(part) {
          if (part.inlineData && part.inlineData.data) enqueueAudio(part.inlineData.data);
        });
      };

      ws.onerror = function(e) {
        console.error('WebSocket error:', e);
        if (!sessionEnded) {
          sessionEnded = true;
          onTranscript('<span style="color:#ef4444;">Connection error — check API key.</span>');
          cleanup(); reject(new Error('WebSocket connection failed'));
        }
      };

      ws.onclose = function(e) {
        console.warn('WebSocket closed — code: ' + e.code + ', reason: "' + e.reason + '"');
        if (!sessionEnded) {
          sessionEnded = true;
          var detail = e.reason ? ': ' + e.reason : ' (code ' + e.code + ')';
          onTranscript('<span style="color:#f59e0b;">Session disconnected' + detail + '.</span>');
          cleanup(); reject(new Error('WebSocket closed: ' + (e.reason || e.code)));
        }
      };

      function startMicCapture() {
        micSource = captureCtx.createMediaStreamSource(micStream);
        processor = captureCtx.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = function(e) {
          if (isMuted || sessionEnded || !ws || ws.readyState !== WebSocket.OPEN) return;
          var float32 = e.inputBuffer.getChannelData(0);
          var int16 = new Int16Array(float32.length);
          for (var i = 0; i < float32.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
          }
          var bytes = new Uint8Array(int16.buffer);
          var binary = '';
          for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]);
          ws.send(JSON.stringify({
            realtimeInput: { mediaChunks: [{ mimeType: 'audio/pcm;rate=16000', data: btoa(binary) }] }
          }));
        };
        micSource.connect(processor);
        processor.connect(captureCtx.destination);
      }

      function enqueueAudio(base64) {
        playbackQueue = playbackQueue.then(function() {
          return new Promise(function(res) {
            try {
              var binary = atob(base64);
              var bytes = new Uint8Array(binary.length);
              for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
              var numSamples = Math.floor(bytes.length / 2);
              var float32 = new Float32Array(numSamples);
              var view = new DataView(bytes.buffer);
              for (var j = 0; j < numSamples; j++) float32[j] = view.getInt16(j * 2, true) / 32768.0;
              var audioBuffer = playbackCtx.createBuffer(1, numSamples, 24000);
              audioBuffer.copyToChannel(float32, 0);
              var source = playbackCtx.createBufferSource();
              source.buffer = audioBuffer;
              source.connect(playbackCtx.destination);
              source.onended = res;
              source.start();
            } catch(e) { console.error('Audio playback error:', e); res(); }
          });
        });
      }

      function stopEverything() {
        sessionEnded = true;
        if (processor) { try { processor.disconnect(); } catch(_) {} }
        if (micSource)  { try { micSource.disconnect(); } catch(_) {} }
        if (micStream)  micStream.getTracks().forEach(function(t) { t.stop(); });
        if (ws && ws.readyState === WebSocket.OPEN) ws.close();
      }

      function cleanup() {
        if (captureCtx && captureCtx.state !== 'closed') captureCtx.close();
        if (playbackCtx && playbackCtx.state !== 'closed') playbackCtx.close();
      }
    });
  }

  function buildSystemPrompt(s) {
    var a = s.analysis;
    var lang = s.detectedLanguage === 'Auto-detect' ? 'the local language' : s.detectedLanguage;
    return 'You are BargainBuddy, a voice AI negotiating at a market in ' + s.location.city + ', ' + s.location.country + '.\n' +
      'Speak ONLY in ' + lang + '. Keep responses short — this is live spoken conversation.\n\n' +
      'Product: ' + a.product_description + '\n' +
      'Merchant asking: ' + a.quoted_price + ' ' + a.quoted_currency + '\n' +
      'Your target: ' + a.suggested_local + ' (fair local price)\n' +
      'Walk-away limit: $' + s.maxPrice + ' USD\n' +
      'Negotiation style: ' + s.tone + '\n\n' +
      'Start by greeting the merchant and making an opening counter-offer about 20-30% below the asking price. Negotiate naturally, conceding slowly. If you reach a good price, confirm the deal enthusiastically. If no progress after several rounds, thank them and leave.';
  }

  // ─── SCREEN: LOCATION ─────────────────────────────────────────────────────
  var COUNTRY_LANGUAGE_MAP = {
    'Thailand': 'Thai', 'Japan': 'Japanese', 'China': 'Mandarin Chinese',
    'Taiwan': 'Mandarin Chinese', 'South Korea': 'Korean',
    'Morocco': 'Moroccan Arabic (Darija)', 'Egypt': 'Arabic',
    'Turkey': 'Turkish', 'India': 'Hindi', 'Vietnam': 'Vietnamese',
    'Indonesia': 'Indonesian (Bahasa)', 'Cambodia': 'Khmer',
    'Nepal': 'Nepali', 'Mexico': 'Spanish', 'Peru': 'Spanish',
    'Colombia': 'Spanish', 'Brazil': 'Portuguese', 'Portugal': 'Portuguese',
    'France': 'French', 'Italy': 'Italian', 'Germany': 'German',
    'Russia': 'Russian', 'Kenya': 'Swahili', 'Tanzania': 'Swahili',
  };

  function initLocationScreen() {
    var container = document.getElementById('screen-location');
    container.innerHTML =
      '<h1>📍 Where are you shopping?</h1>' +
      '<input type="text" id="location-input" placeholder="Bangkok, Thailand">' +
      '<h1 style="margin-top:20px;">🗣️ Merchant language:</h1>' +
      '<select id="language-select"></select>' +
      '<button id="start-btn" class="btn-primary">Let\'s Shop! →</button>';

    var input = document.getElementById('location-input');
    var select = document.getElementById('language-select');

    LANGUAGES.forEach(function(lang) {
      var opt = document.createElement('option');
      opt.value = lang; opt.textContent = lang;
      select.appendChild(opt);
    });

    input.value = 'Mumbai, India';
    select.value = 'Hindi';

    input.oninput = function() {
      var val = input.value;
      for (var country in COUNTRY_LANGUAGE_MAP) {
        if (val.toLowerCase().indexOf(country.toLowerCase()) !== -1) {
          select.value = COUNTRY_LANGUAGE_MAP[country];
          break;
        }
      }
    };

    document.getElementById('start-btn').onclick = function() {
      var locStr = input.value;
      var parts = locStr.split(',').map(function(s) { return s.trim(); });
      state.location = { city: parts[0] || '', country: parts[1] || '' };
      state.detectedLanguage = select.value;
      showScreen('capture');
    };

    tryGPS().then(function(loc) {
      if (loc) {
        input.value = loc.city + ', ' + loc.country;
        input.dispatchEvent(new Event('input'));
      }
    });
  }

  function tryGPS() {
    return new Promise(function(resolve) {
      if (!navigator.geolocation) return resolve(null);
      navigator.geolocation.getCurrentPosition(
        async function(pos) {
          var lat = pos.coords.latitude, lon = pos.coords.longitude;
          try {
            var res = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json');
            var data = await res.json();
            resolve({ city: data.address.city || data.address.town || data.address.village || '', country: data.address.country || '' });
          } catch(e) { resolve(null); }
        },
        function() { resolve(null); },
        { timeout: 5000 }
      );
    });
  }

  // ─── SCREEN: CAPTURE ─────────────────────────────────────────────────────
  function initCaptureScreen() {
    var container = document.getElementById('screen-capture');
    container.innerHTML =
      '<div id="pill-container"></div>' +
      '<h1>Upload Product Photo</h1>' +
      '<p style="color:#aaa;font-size:14px;margin-bottom:20px;">Please upload a photo of the item you\'re looking at.</p>' +
      '<div class="card"><label>Describe the product briefly</label>' +
      '<input type="text" id="product-desc-input" placeholder="e.g. Blue silk scarf, wooden elephant statue"></div>' +
      '<button id="upload-btn" class="btn-primary">📁 Choose Photo</button>' +
      '<input type="file" id="upload-input" accept="image/*" style="display:none;">' +
      '<div id="preview-area" style="display:none;margin-top:20px;">' +
      '<img id="capture-preview" class="preview-img">' +
      '<button id="looks-good-btn" class="btn-primary">Analyze This →</button>' +
      '<button id="retake-btn" class="btn-secondary">Remove Photo</button>' +
      '</div>';

    renderLocationPill(document.getElementById('pill-container'));

    var uploadBtn   = document.getElementById('upload-btn');
    var uploadInput = document.getElementById('upload-input');
    var descInput   = document.getElementById('product-desc-input');
    var previewArea = document.getElementById('preview-area');
    var previewImg  = document.getElementById('capture-preview');

    if (state.productDescription) descInput.value = state.productDescription;

    uploadBtn.onclick = function() { uploadInput.click(); };
    uploadInput.onchange = function(e) {
      var file = e.target.files[0];
      if (!file) return;
      state.imageMimeType = file.type || 'image/jpeg';
      var reader = new FileReader();
      reader.onload = function(ev) { showPreview(ev.target.result); };
      reader.readAsDataURL(file);
    };

    function showPreview(base64) {
      state.imageBase64 = base64.split(',')[1];
      previewImg.src = base64;
      previewArea.style.display = 'block';
      uploadBtn.style.display = 'none';
    }

    document.getElementById('retake-btn').onclick = function() {
      state.imageBase64 = null;
      previewArea.style.display = 'none';
      uploadBtn.style.display = 'block';
      uploadInput.value = '';
    };

    document.getElementById('looks-good-btn').onclick = function() {
      var desc = descInput.value.trim();
      if (!desc) { alert('Please provide a brief description of the product.'); return; }
      if (!state.imageBase64) { alert('Please upload a photo first.'); return; }
      state.productDescription = desc;
      showScreen('analysis');
    };
  }

  // ─── SCREEN: ANALYSIS ────────────────────────────────────────────────────
  function initAnalysisScreen() {
    var container = document.getElementById('screen-analysis');
    container.innerHTML =
      '<div id="pill-container-analysis"></div>' +
      '<div id="loading-area" style="text-align:center;padding:40px;">' +
      '<div class="live-dot"></div> Identifying "' + state.productDescription + '"...' +
      '</div>' +
      '<div id="result-area" style="display:none;"></div>';

    renderLocationPill(document.getElementById('pill-container-analysis'));

    analyzeProduct(state.imageBase64, state.imageMimeType || 'image/jpeg', state.location, state.productDescription)
      .then(function(result) {
        state.analysis = result;
        displayAnalysisResult(result, false);
      })
      .catch(function(e) {
        console.error('Analysis error (falling back):', e);
        var fallback = {
          product_description: state.productDescription,
          quoted_price: 'Market Average', quoted_currency: 'Local',
          quoted_price_usd: 15.00, suggested_usd: 15.00,
          suggested_local: 'See locally',
          local_context: 'Estimating price for ' + state.productDescription + ' in ' + state.location.country + '.',
          reasoning: 'AI analysis was limited, showing market averages.',
          negotiation_floor: 10.00, tourist_markup: 'medium'
        };
        state.analysis = fallback;
        displayAnalysisResult(fallback, true);
      });
  }

  function displayAnalysisResult(res, isFallback) {
    var badgeClass = res.tourist_markup === 'high' ? 'badge-high' : (res.tourist_markup === 'medium' ? 'badge-medium' : 'badge-low');
    var badgeEmoji = res.tourist_markup === 'high' ? '🔴' : (res.tourist_markup === 'medium' ? '🟡' : '🟢');
    var savingsPct = (res.quoted_price_usd && res.suggested_usd)
      ? Math.round((1 - res.suggested_usd / res.quoted_price_usd) * 100) : null;
    var savedUsd = (res.quoted_price_usd && res.suggested_usd)
      ? (res.quoted_price_usd - res.suggested_usd).toFixed(2) : null;

    document.getElementById('loading-area').style.display = 'none';
    var area = document.getElementById('result-area');
    area.innerHTML =
      (isFallback ? '<p style="color:#f59e0b;font-size:12px;margin-bottom:8px;text-align:center;">⚠️ Using estimated market price</p>' : '') +
      '<div class="card" style="padding:28px 24px;text-align:center;">' +
        '<p style="font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;">Offer this price</p>' +
        '<p style="font-size:60px;font-weight:800;color:#22c55e;line-height:1;margin:0;">$' + res.suggested_usd + '</p>' +
        '<p style="font-size:15px;color:#3d9e60;margin-top:6px;">' + res.suggested_local + '</p>' +
        '<div style="border-top:1px solid #1e1e1e;margin:20px 0;"></div>' +
        '<div style="display:flex;justify-content:space-around;align-items:center;">' +
          '<div>' +
            '<p style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">They ask</p>' +
            '<p style="font-size:20px;font-weight:600;color:#666;text-decoration:line-through;">$' + (res.quoted_price_usd || '?') + '</p>' +
            '<p style="font-size:11px;color:#444;">' + res.quoted_price + '</p>' +
          '</div>' +
          '<div style="text-align:center;">' +
            (savingsPct ? '<p style="font-size:32px;font-weight:800;color:#22c55e;line-height:1;">−' + savingsPct + '%</p>' +
              '<p style="font-size:12px;color:#3d9e60;margin-top:2px;">you save $' + savedUsd + '</p>' : '') +
          '</div>' +
          '<div>' +
            '<p style="font-size:11px;color:#3d9e60;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;">Markup</p>' +
            '<span class="' + badgeClass + '" style="font-size:12px;">' + badgeEmoji + ' ' + res.tourist_markup + '</span>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<p style="font-size:12px;color:#444;text-align:center;margin:10px 0 16px;padding:0 16px;' +
        'overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">' + res.product_description + '</p>' +
      '<button id="set-budget-btn" class="btn-primary">Set My Budget →</button>';

    area.style.display = 'block';
    document.getElementById('set-budget-btn').onclick = function() { showScreen('preferences'); };
  }

  // ─── SCREEN: PREFERENCES ─────────────────────────────────────────────────
  function initPreferencesScreen() {
    var container = document.getElementById('screen-preferences');
    var suggestedUsd = (state.analysis && state.analysis.suggested_usd) ? state.analysis.suggested_usd : '';
    container.innerHTML =
      '<div id="pill-container-prefs"></div>' +
      '<h1>Negotiation Rules</h1>' +
      '<div class="card"><label>Walk away if price stays above</label>' +
      '<div style="display:flex;align-items:center;gap:8px;"><span>$</span>' +
      '<input type="number" id="max-price" step="0.50" value="' + (state.maxPrice || suggestedUsd) + '"></div></div>' +
      '<div class="card"><label>Negotiation Tone</label>' +
      '<div class="tone-group">' +
        '<button class="tone-btn ' + (state.tone === 'aggressive' ? 'active' : '') + '" data-tone="aggressive">Aggressive</button>' +
        '<button class="tone-btn ' + (state.tone === 'friendly' ? 'active' : '') + '" data-tone="friendly">Friendly</button>' +
        '<button class="tone-btn ' + (state.tone === 'neutral' ? 'active' : '') + '" data-tone="neutral">Neutral</button>' +
      '</div></div>' +
      '<div class="card"><label>AI Voice</label>' +
      '<select id="voice-select">' +
        '<option value="Puck">Puck (Default)</option>' +
        '<option value="Charon">Charon</option>' +
        '<option value="Kore">Kore</option>' +
        '<option value="Fenrir">Fenrir</option>' +
        '<option value="Aoede">Aoede</option>' +
      '</select></div>' +
      '<p style="font-size:13px;color:#aaa;text-align:center;">🗣️ AI will negotiate in: <b>' + state.detectedLanguage + '</b></p>' +
      '<button id="start-neg-btn" class="btn-primary">Start Negotiating →</button>';

    renderLocationPill(document.getElementById('pill-container-prefs'));

    document.getElementById('voice-select').value = state.voice;

    document.querySelectorAll('.tone-btn').forEach(function(btn) {
      btn.onclick = function() {
        document.querySelectorAll('.tone-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        state.tone = btn.dataset.tone;
      };
    });

    document.getElementById('start-neg-btn').onclick = function() {
      state.maxPrice = parseFloat(document.getElementById('max-price').value);
      state.voice = document.getElementById('voice-select').value;
      showScreen('negotiation');
    };
  }

  // ─── SCREEN: NEGOTIATION ─────────────────────────────────────────────────
  async function initNegotiationScreen() {
    var container = document.getElementById('screen-negotiation');
    container.innerHTML =
      '<div id="pill-container-neg"></div>' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
        '<span>Negotiating in ' + state.detectedLanguage + '...</span>' +
        '<span><span class="live-dot"></span> LIVE</span>' +
      '</div>' +
      '<div id="transcript-box" class="transcript">' +
        '<p id="initial-msg" style="color:#22c55e;font-style:italic;">AI is starting the negotiation...</p>' +
      '</div>' +
      '<div style="display:flex;gap:8px;margin-top:16px;">' +
        '<button id="deal-btn" class="btn-primary" style="flex:1;">✅ Accept Deal</button>' +
        '<button id="walkaway-btn" class="btn-secondary" style="flex:1;">👋 Walk Away</button>' +
      '</div>' +
      '<div style="display:flex;gap:8px;margin-top:8px;">' +
        '<button id="mute-btn" class="btn-secondary" style="flex:1;">🔇 Mute</button>' +
        '<button id="stop-neg-btn" class="btn-danger" style="flex:1;">✕ Stop</button>' +
      '</div>' +
      '<div style="margin-top:12px;">' +
        '<label style="font-size:13px;color:#aaa;">Final price if accepting deal ($USD)</label>' +
        '<input type="number" id="final-price-input" step="0.50" value="' + (state.maxPrice || (state.analysis && state.analysis.suggested_usd) || '') + '" style="margin-top:4px;">' +
      '</div>';

    renderLocationPill(document.getElementById('pill-container-neg'));

    var transcriptBox = document.getElementById('transcript-box');
    var isMuted = false, firstMessage = true, sessionDone = false;

    function appendTranscript(text) {
      if (firstMessage) { transcriptBox.innerHTML = ''; firstMessage = false; }
      var p = document.createElement('p');
      p.style.marginBottom = '12px';
      p.innerHTML = '<b style="color:#22c55e;">BargainBuddy:</b> ' + text;
      transcriptBox.appendChild(p);
      transcriptBox.scrollTop = transcriptBox.scrollHeight;
    }

    function finishSession(outcome, finalPrice) {
      if (sessionDone) return;
      sessionDone = true;
      state.outcome = outcome;
      state.finalPrice = finalPrice;
      showScreen('result');
    }

    var negotiation;
    try {
      negotiation = await startNegotiation(state, appendTranscript, finishSession);
    } catch(e) {
      appendTranscript('<span style="color:#ef4444;">Failed to start: ' + e.message + '</span>');
      return;
    }

    document.getElementById('deal-btn').onclick = function() {
      var price = parseFloat(document.getElementById('final-price-input').value) || state.maxPrice;
      negotiation.stop(); finishSession('deal', price);
    };
    document.getElementById('walkaway-btn').onclick = function() {
      negotiation.stop(); finishSession('walkaway', null);
    };
    document.getElementById('mute-btn').onclick = function(e) {
      isMuted = !isMuted;
      negotiation.mute(isMuted);
      e.target.textContent = isMuted ? '🔊 Unmute' : '🔇 Mute';
    };
    document.getElementById('stop-neg-btn').onclick = function() {
      negotiation.stop(); showScreen('location');
    };
  }

  // ─── SCREEN: RESULT ───────────────────────────────────────────────────────
  function initResultScreen() {
    var container = document.getElementById('screen-result');
    var isDeal = state.outcome === 'deal';

    if (isDeal) {
      var quotedUsd = parseFloat((state.analysis && state.analysis.quoted_price_usd) || 0);
      var saved = Math.max(0, quotedUsd - (state.finalPrice || 0)).toFixed(2);
      container.innerHTML =
        '<div style="text-align:center;padding:40px 0;">' +
          '<div style="font-size:80px;">✅</div>' +
          '<h1 style="color:#22c55e;">Deal closed!</h1>' +
        '</div>' +
        '<div class="card">' +
          '<p>You paid: <b>$' + state.finalPrice + ' USD</b></p>' +
          '<p style="color:#22c55e;margin-top:8px;">You saved: <b>$' + saved + ' USD</b></p>' +
          '<hr style="margin:16px 0;border:0;border-top:1px solid #333;">' +
          '<p style="color:#aaa;font-size:14px;">' + (state.analysis && state.analysis.product_description) + ' in ' + (state.location && state.location.city) + '</p>' +
        '</div>' +
        '<button id="shop-another-btn" class="btn-primary">🛍️ Shop another item</button>' +
        '<button id="new-loc-btn" class="btn-secondary">📍 Change location</button>';

      document.getElementById('shop-another-btn').onclick = function() { showScreen('capture'); };
      document.getElementById('new-loc-btn').onclick = function() { showScreen('location'); };
    } else {
      container.innerHTML =
        '<div style="text-align:center;padding:40px 0;">' +
          '<div style="font-size:80px;">👋</div>' +
          '<h1>You kept your budget!</h1>' +
          '<p style="color:#aaa;margin-top:10px;">Their best offer didn\'t meet your limit. Smart move.</p>' +
        '</div>' +
        '<button id="try-again-btn" class="btn-primary">🔄 Try again</button>' +
        '<button id="new-item-btn" class="btn-secondary">🛍️ New item</button>' +
        '<button id="new-loc-result-btn" class="btn-secondary">📍 New location</button>';

      document.getElementById('try-again-btn').onclick = function() { showScreen('preferences'); };
      document.getElementById('new-item-btn').onclick = function() { showScreen('capture'); };
      document.getElementById('new-loc-result-btn').onclick = function() { showScreen('location'); };
    }
  }

  // ─── START ────────────────────────────────────────────────────────────────
  showScreen('location');
  </script>
</body>
</html>
