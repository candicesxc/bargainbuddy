<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BargainBuddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080808;
      --bg2:      #111111;
      --bg3:      #1a1a1a;
      --border:   #222222;
      --green:    #00FF88;
      --green-dim:#00cc6a;
      --orange:   #FF6B35;
      --gold:     #FFD60A;
      --red:      #FF3B3B;
      --text:     #FFFFFF;
      --muted:    #666666;
      --muted2:   #444444;
      --radius-lg:20px;
      --radius-md:14px;
      --radius-sm:10px;
      --glow-green: 0 0 24px rgba(0,255,136,0.35);
      --glow-orange: 0 0 24px rgba(255,107,53,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 40px;
      overflow-x: hidden;
    }

    /* ── Typography ── */
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    h3 { font-family: 'Syne', sans-serif; font-weight: 700; }
    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }

    /* ── Screen ── */
    .screen { width: 100%; animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 14px;
    }
    .card-accent {
      background: var(--bg2);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: 14px;
      border: 1px solid transparent;
      background-clip: padding-box;
      position: relative;
    }
    .card-accent::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: calc(var(--radius-lg) + 1px);
      background: linear-gradient(135deg, var(--green) 0%, var(--orange) 100%);
      z-index: -1;
    }

    /* ── Inputs ── */
    input, select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 15px;
      font-family: 'Manrope', sans-serif;
      font-weight: 500;
      margin-top: 0;
      outline: none;
      transition: border-color 200ms, box-shadow 200ms;
      -webkit-appearance: none;
    }
    input:focus, select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,255,136,0.12);
    }
    select { cursor: pointer; }

    /* ── Buttons ── */
    button {
      min-height: 52px;
      padding: 14px 24px;
      border-radius: var(--radius-md);
      border: none;
      font-size: 15px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: all 200ms ease;
    }
    .btn-primary {
      background: var(--green);
      color: #000;
      box-shadow: var(--glow-green);
    }
    .btn-primary:hover {
      background: #1aff99;
      box-shadow: 0 0 36px rgba(0,255,136,0.5);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: #444; background: #1f1f1f; }

    .btn-danger {
      background: rgba(255,59,59,0.12);
      color: var(--red);
      border: 1px solid rgba(255,59,59,0.3);
    }
    .btn-danger:hover { background: rgba(255,59,59,0.2); }

    /* ── Tone Buttons ── */
    .tone-group { display: flex; gap: 8px; margin-top: 10px; }
    .tone-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      flex: 1;
      font-size: 13px;
      min-height: 44px;
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      border-radius: var(--radius-sm);
    }
    .tone-btn.active {
      background: rgba(0,255,136,0.1);
      color: var(--green);
      border-color: var(--green);
    }

    /* ── Location Pill ── */
    .location-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px 6px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 20px;
      cursor: pointer;
      transition: border-color 200ms, color 200ms;
    }
    .location-pill:hover { border-color: #444; color: #999; }
    .location-pill svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Live Dot ── */
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--red);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }

    /* ── Transcript ── */
    .transcript {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      height: 260px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.7;
      color: #aaa;
      margin-top: 14px;
      font-family: 'Manrope', sans-serif;
    }
    .transcript::-webkit-scrollbar { width: 4px; }
    .transcript::-webkit-scrollbar-track { background: transparent; }
    .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Badges ── */
    .badge-high   { background: rgba(255,59,59,0.12); color: #FF6B6B; border: 1px solid rgba(255,59,59,0.25); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge-medium { background: rgba(255,166,0,0.12); color: #FFAA00; border: 1px solid rgba(255,166,0,0.25); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge-low    { background: rgba(0,255,136,0.10); color: var(--green); border: 1px solid rgba(0,255,136,0.25); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }

    /* ── Preview ── */
    .preview-img {
      width: 100%;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      margin-bottom: 14px;
      display: block;
    }

    /* ── Camera Viewfinder ── */
    #camera-viewfinder {
      width: 100%; aspect-ratio: 3/4;
      background: #000; border-radius: var(--radius-lg);
      object-fit: cover; margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    /* ── Upload Area ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 200ms, background 200ms;
      margin-bottom: 14px;
    }
    .upload-area:hover { border-color: var(--green); background: rgba(0,255,136,0.04); }

    /* ── Modal ── */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: var(--radius-lg);
      width: 92%;
      max-width: 400px;
    }
    .modal-content h3 { margin-bottom: 16px; font-size: 18px; }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      margin-top: 8px;
    }
    .logo-wrap img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, var(--green), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-tagline {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .divider { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Savings number ── */
    .price-hero {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: var(--green);
      line-height: 1;
    }
    .price-strikethrough {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: var(--muted2);
      text-decoration: line-through;
      text-decoration-color: var(--red);
    }

    /* ── Tag label ── */
    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ── Loading spinner ── */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile — safe areas, touch, zoom prevention ── */
    @media (max-width: 480px) {
      body {
        padding: 20px 16px calc(32px + env(safe-area-inset-bottom));
        /* Prevent iOS bounce scroll on body */
        overscroll-behavior-y: none;
      }
      h1 { font-size: 22px; }
      .logo-wrap img { width: 68px; height: 68px; }
      .logo-name { font-size: 24px; }
      /* Larger touch targets on small screens */
      button { min-height: 52px; font-size: 15px; }
      .tone-btn { min-height: 46px; }
      /* Keep font-size 16px+ on inputs to prevent iOS auto-zoom */
      input, select { font-size: 16px; }
      /* Tighter card padding on very small screens */
      .card, .card-accent { padding: 16px; }
      /* Price hero scales down */
      .price-hero[style*="font-size:64px"] { font-size: 52px !important; }
      .price-hero[style*="font-size:48px"] { font-size: 40px !important; }
      /* Upload area compact */
      .upload-area { padding: 28px 16px; }
      /* Transcript height on mobile */
      .transcript { height: 220px; }
    }

    /* ── Very small phones ── */
    @media (max-width: 360px) {
      body { padding-left: 12px; padding-right: 12px; }
      h1 { font-size: 20px; }
      .logo-name { font-size: 22px; }
    }

    /* ── iOS standalone / PWA mode ── */
    @supports (-webkit-touch-callout: none) {
      body { padding-top: calc(20px + env(safe-area-inset-top)); }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, .screen, .live-dot, .spinner { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div id="screen-location" class="screen"></div>
  <div id="screen-capture" class="screen" style="display:none;"></div>
  <div id="screen-analysis" class="screen" style="display:none;"></div>
  <div id="screen-preferences" class="screen" style="display:none;"></div>
  <div id="screen-negotiation" class="screen" style="display:none;"></div>
  <div id="screen-result" class="screen" style="display:none;"></div>

  <div id="location-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Change Location</h3>
      <label>City, Country</label>
      <input type="text" id="modal-location-input" placeholder="Mumbai, India">
      <div style="margin-top:14px;">
        <label>Merchant Language</label>
        <select id="modal-language-select"></select>
      </div>
      <button id="modal-update-btn" class="btn-primary" style="margin-top:16px;">Update</button>
      <button id="modal-close-btn" class="btn-secondary">Cancel</button>
    </div>
  </div>

  <script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  var CONFIG = {
    GEMINI_API_KEY: 'YOUR_API_KEY_HERE'
  };

  // ─── APP STATE ────────────────────────────────────────────────────────────
  var state = {
    location: null,
    detectedLanguage: null,
    analysis: null,
    imageBase64: null,
    imageMimeType: null,
    productDescription: '',
    merchantAskedPrice: null,   // raw string e.g. "600 INR" or "600"
    maxPrice: null,
    tone: 'friendly',
    voice: 'Puck',
    outcome: null,
    finalPrice: null,
  };

  var LANGUAGES = [
    'Auto-detect',
    'Thai', 'Japanese', 'Mandarin Chinese', 'Korean',
    'Arabic', 'Moroccan Arabic (Darija)', 'Turkish', 'Hindi',
    'Vietnamese', 'Indonesian (Bahasa)', 'Khmer', 'Nepali',
    'Spanish', 'Portuguese', 'French', 'Italian',
    'German', 'Russian', 'Swahili', 'English'
  ];

  // ─── SCREEN ROUTER ────────────────────────────────────────────────────────
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(function(s) { s.style.display = 'none'; });
    var el = document.getElementById('screen-' + name);
    el.style.display = 'block';
    // Re-trigger animation
    el.classList.remove('screen');
    void el.offsetWidth;
    el.classList.add('screen');
    switch (name) {
      case 'location':    initLocationScreen();    break;
      case 'capture':     initCaptureScreen();     break;
      case 'analysis':    initAnalysisScreen();    break;
      case 'preferences': initPreferencesScreen(); break;
      case 'negotiation': initNegotiationScreen(); break;
      case 'result':      initResultScreen();      break;
    }
  }

  function renderLocationPill(container) {
    if (!state.location) return;
    var pill = document.createElement('div');
    pill.className = 'location-pill';
    pill.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>' +
      (state.location.city || state.location.country) + ' · ' + state.detectedLanguage +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:2px;opacity:0.5;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    pill.onclick = openLocationModal;
    container.prepend(pill);
  }

  function openLocationModal() {
    var modal = document.getElementById('location-modal');
    var input = document.getElementById('modal-location-input');
    var select = document.getElementById('modal-language-select');
    input.value = state.location.city + ', ' + state.location.country;
    select.innerHTML = '';
    LANGUAGES.forEach(function(lang) {
      var opt = document.createElement('option');
      opt.value = lang; opt.textContent = lang;
      if (lang === state.detectedLanguage) opt.selected = true;
      select.appendChild(opt);
    });
    modal.style.display = 'flex';
  }

  document.getElementById('modal-close-btn').onclick = function() {
    document.getElementById('location-modal').style.display = 'none';
  };

  document.getElementById('modal-update-btn').onclick = function() {
    var locStr = document.getElementById('modal-location-input').value;
    var lang = document.getElementById('modal-language-select').value;
    var parts = locStr.split(',').map(function(s) { return s.trim(); });
    state.location = { city: parts[0] || '', country: parts[1] || '' };
    state.detectedLanguage = lang;
    document.getElementById('location-modal').style.display = 'none';
    if (document.getElementById('screen-analysis').style.display === 'block') {
      initAnalysisScreen();
    } else {
      var cur = document.querySelector('.screen[style*="display: block"]');
      if (cur) showScreen(cur.id.replace('screen-', ''));
    }
  };

  // ─── GEMINI VISION (direct REST) ─────────────────────────────────────────
  async function analyzeProduct(base64Image, mimeType, location, productDescription) {
    var apiKey = (window.CONFIG || CONFIG).GEMINI_API_KEY;
    if (!apiKey || apiKey.includes('PASTE')) throw new Error('Invalid API Key');

    var merchantPriceNote = state.merchantAskedPrice
      ? 'IMPORTANT: The user has told you the merchant verbally quoted "' + state.merchantAskedPrice + '". Use this as the "quoted_price" value. This overrides anything you read from the image.\n\n'
      : '';

    var prompt = 'You are an expert local street-market appraiser in ' + location.city + ', ' + location.country + '.\n' +
      'The user describes this item as: "' + productDescription + '"\n\n' +
      merchantPriceNote +
      'STEP 1 — Read the price tag: ' + (state.merchantAskedPrice ? 'The merchant quoted "' + state.merchantAskedPrice + '" — use this as quoted_price.' : 'Look carefully at the image for any visible price tag, price sticker, handwritten price, or label. If visible, extract it exactly as written.') + '\n\n' +
      'STEP 2 — If no price is known: Estimate the price a merchant in ' + location.city + ' would first quote to a foreign tourist for this specific type of item.\n\n'
      'STEP 3 — Determine the fair price: Based on what locals actually pay (not the tourist ask), provide "suggested_usd" as the fair market value in USD using current realistic exchange rates for ' + location.country + '.\n\n' +
      'Return ONLY valid JSON with no markdown or backticks:\n' +
      '{\n' +
      '  "product_description": "Detailed description of the product",\n' +
      '  "quoted_price": "The price shown in the image or estimated tourist ask if not visible",\n' +
      '  "quoted_currency": "Local currency code (e.g. INR, THB, JPY)",\n' +
      '  "quoted_price_usd": <USD equivalent as a realistic number>,\n' +
      '  "suggested_usd": <fair local market price in USD as a realistic number>,\n' +
      '  "suggested_local": "Fair price in local currency (e.g. 350 INR)",\n' +
      '  "local_context": "One sentence about typical pricing for this item in ' + location.city + '.",\n' +
      '  "reasoning": "One sentence explaining the price difference.",\n' +
      '  "negotiation_floor": <absolute lowest a local vendor would accept in USD>,\n' +
      '  "tourist_markup": "low | medium | high"\n' +
      '}\n\n' +
      'IMPORTANT: All USD values must reflect real-world prices. Use current exchange rates. Do not use placeholder or example values.';

    var response = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { inlineData: { mimeType: mimeType || 'image/jpeg', data: base64Image } },
            { text: prompt }
          ]}]
        })
      }
    );

    var data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error');
    var text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    var jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('AI returned unreadable format');
    return JSON.parse(jsonMatch[0]);
  }

  // ─── GEMINI LIVE (WebSocket) ──────────────────────────────────────────────
  var LIVE_WS_URL = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent';

  async function startNegotiation(negotiationState, onTranscript, onDone) {
    var apiKey = (window.CONFIG || CONFIG).GEMINI_API_KEY;
    if (!apiKey || apiKey.includes('PASTE')) throw new Error('Invalid API Key');

    var micStream, captureCtx, playbackCtx, micSource, processor, ws;
    var isMuted = false, sessionEnded = false;
    var playbackQueue = Promise.resolve();

    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    captureCtx = new AudioContext({ sampleRate: 16000 });
    await captureCtx.resume();
    playbackCtx = new AudioContext({ sampleRate: 24000 });
    await playbackCtx.resume();

    return new Promise(function(resolve, reject) {
      ws = new WebSocket(LIVE_WS_URL + '?key=' + apiKey);
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        ws.send(JSON.stringify({
          setup: {
            model: 'models/gemini-2.5-flash-native-audio-latest',
            systemInstruction: { parts: [{ text: buildSystemPrompt(negotiationState) }] },
            generationConfig: { responseModalities: ['AUDIO'] }
          }
        }));
      };

      ws.onmessage = function(event) {
        var msg;
        try {
          var text = event.data instanceof ArrayBuffer
            ? new TextDecoder().decode(event.data)
            : event.data;
          msg = JSON.parse(text);
        } catch(e) { console.error('WS parse error:', e); return; }

        if (msg.setupComplete) {
          startMicCapture();
          var lang = negotiationState.detectedLanguage === 'Auto-detect' ? 'the local language' : negotiationState.detectedLanguage;
          ws.send(JSON.stringify({
            clientContent: {
              turns: [{ role: 'user', parts: [{ text: 'Begin the negotiation now in ' + lang + '. Make your opening offer immediately.' }] }],
              turnComplete: true
            }
          }));
          resolve({ stop: stopEverything, mute: function(val) { isMuted = val; } });
          return;
        }

        var parts = (msg.serverContent && msg.serverContent.modelTurn && msg.serverContent.modelTurn.parts) || [];
        parts.forEach(function(part) {
          if (part.inlineData && part.inlineData.data) enqueueAudio(part.inlineData.data);
        });
      };

      ws.onerror = function(e) {
        console.error('WebSocket error:', e);
        if (!sessionEnded) {
          sessionEnded = true;
          onTranscript('<span style="color:var(--red)">Connection error — check API key.</span>');
          cleanup(); reject(new Error('WebSocket connection failed'));
        }
      };

      ws.onclose = function(e) {
        console.warn('WebSocket closed — code: ' + e.code + ', reason: "' + e.reason + '"');
        if (!sessionEnded) {
          sessionEnded = true;
          var detail = e.reason ? ': ' + e.reason : ' (code ' + e.code + ')';
          onTranscript('<span style="color:#FFAA00">Session disconnected' + detail + '.</span>');
          cleanup(); reject(new Error('WebSocket closed: ' + (e.reason || e.code)));
        }
      };

      function startMicCapture() {
        micSource = captureCtx.createMediaStreamSource(micStream);
        processor = captureCtx.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = function(e) {
          if (isMuted || sessionEnded || !ws || ws.readyState !== WebSocket.OPEN) return;
          var float32 = e.inputBuffer.getChannelData(0);
          var int16 = new Int16Array(float32.length);
          for (var i = 0; i < float32.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
          }
          var bytes = new Uint8Array(int16.buffer);
          var binary = '';
          for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]);
          ws.send(JSON.stringify({
            realtimeInput: { mediaChunks: [{ mimeType: 'audio/pcm;rate=16000', data: btoa(binary) }] }
          }));
        };
        micSource.connect(processor);
        processor.connect(captureCtx.destination);
      }

      function enqueueAudio(base64) {
        playbackQueue = playbackQueue.then(function() {
          return new Promise(function(res) {
            try {
              var binary = atob(base64);
              var bytes = new Uint8Array(binary.length);
              for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
              var numSamples = Math.floor(bytes.length / 2);
              var float32 = new Float32Array(numSamples);
              var view = new DataView(bytes.buffer);
              for (var j = 0; j < numSamples; j++) float32[j] = view.getInt16(j * 2, true) / 32768.0;
              var audioBuffer = playbackCtx.createBuffer(1, numSamples, 24000);
              audioBuffer.copyToChannel(float32, 0);
              var source = playbackCtx.createBufferSource();
              source.buffer = audioBuffer;
              source.connect(playbackCtx.destination);
              source.onended = res;
              source.start();
            } catch(e) { console.error('Audio playback error:', e); res(); }
          });
        });
      }

      function stopEverything() {
        sessionEnded = true;
        if (processor) { try { processor.disconnect(); } catch(_) {} }
        if (micSource)  { try { micSource.disconnect(); } catch(_) {} }
        if (micStream)  micStream.getTracks().forEach(function(t) { t.stop(); });
        if (ws && ws.readyState === WebSocket.OPEN) ws.close();
      }

      function cleanup() {
        if (captureCtx && captureCtx.state !== 'closed') captureCtx.close();
        if (playbackCtx && playbackCtx.state !== 'closed') playbackCtx.close();
      }
    });
  }

  function tryGPS() {
    return new Promise(function(resolve) {
      if (!navigator.geolocation) return resolve(null);
      navigator.geolocation.getCurrentPosition(
        async function(pos) {
          var lat = pos.coords.latitude, lon = pos.coords.longitude;
          try {
            var res = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json');
            var data = await res.json();
            resolve({ city: data.address.city || data.address.town || data.address.village || '', country: data.address.country || '' });
          } catch(e) { resolve(null); }
        },
        function() { resolve(null); },
        { timeout: 5000 }
      );
    });
  }

  function displayAnalysisResult(res, isFallback) {
    // Safely coerce every field — never let undefined reach innerHTML
    // Always fall back to what the user manually entered on the capture screen
    var quotedPrice    = res.quoted_price    || state.merchantAskedPrice || null;
    var quotedPriceUsd = res.quoted_price_usd != null ? Number(res.quoted_price_usd) : null;
    var suggestedLocal = res.suggested_local || null;
    var suggestedUsd   = res.suggested_usd   != null ? Number(res.suggested_usd)   : null;
    var productDesc    = res.product_description || state.productDescription || '';
    var markup         = res.tourist_markup || null;
    // If we have the merchant price from user input, this isn't really a fallback failure
    var trulyNoData    = !quotedPrice && !suggestedLocal && !suggestedUsd;

    var badgeClass  = markup === 'high' ? 'badge-high' : (markup === 'medium' ? 'badge-medium' : 'badge-low');
    var markupLabel = (markup || 'unknown') + ' markup';

    var savingsPct = (quotedPriceUsd && suggestedUsd)
      ? Math.round((1 - suggestedUsd / quotedPriceUsd) * 100) : null;
    var savedUsd   = (quotedPriceUsd && suggestedUsd)
      ? (quotedPriceUsd - suggestedUsd).toFixed(2) : null;

    // Render "local · $X USD", gracefully handling any missing value
    function pricePair(localStr, usdNum, strikethrough, color) {
      var parts = [];
      if (localStr != null && String(localStr).trim()) parts.push(String(localStr).trim());
      if (usdNum  != null && !isNaN(usdNum))           parts.push('$' + usdNum + ' USD');
      var combined = parts.length ? parts.join('  ·  ') : '—';
      var style = 'font-family:Manrope,sans-serif;font-weight:700;font-size:26px;line-height:1.2;color:' + (color || 'inherit') + ';';
      if (strikethrough) style += 'text-decoration:line-through;text-decoration-color:var(--red);text-decoration-thickness:2px;';
      return '<span style="' + style + '">' + combined + '</span>';
    }

    document.getElementById('loading-area').style.display = 'none';
    var area = document.getElementById('result-area');

    area.innerHTML =
      (trulyNoData ? '<p style="color:#FFAA00;font-size:12px;margin-bottom:16px;text-align:center;font-weight:600;letter-spacing:0.05em;">⚠ Could not read price — set amounts manually below</p>' : '') +

        // ── Merchant's price

          '<p style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Merchant\'s price</p>' +
          pricePair(quotedPrice, quotedPriceUsd, true, 'var(--muted2)') +
          '<div style="margin-top:8px;">' +
            '<span class="' + badgeClass + '">' + markupLabel + '</span>' +
          '</div>' +
        '</div>' +

        // ── Savings ribbon

            '<span style="font-family:Manrope,sans-serif;font-size:13px;font-weight:700;color:var(--green);">$' + savedUsd + ' &nbsp;·&nbsp; −' + savingsPct + '%</span>' +

        '</div>' +

      '<div class="card" style="margin-top:14px;">' +
        '<label>Final price to log if accepting ($USD)</label>' +
        '<input type="number" id="final-price-input" step="0.50" value="' + (state.maxPrice || (state.analysis && state.analysis.suggested_usd) || '') + '" style="margin-top:0;">' +
      '</div>';

    renderLocationPill(document.getElementById('pill-container-neg'));

    var transcriptBox = document.getElementById('transcript-box');
    var isMuted = false, firstMessage = true, sessionDone = false;

    function appendTranscript(text) {
      if (firstMessage) { transcriptBox.innerHTML = ''; firstMessage = false; }
      var p = document.createElement('p');
      p.style.marginBottom = '12px';
      p.innerHTML = '<span style="font-weight:700;color:var(--green);font-family:Syne,sans-serif;">AI</span> <span style="color:var(--muted);margin:0 4px;">·</span> ' + text;
      transcriptBox.appendChild(p);
      transcriptBox.scrollTop = transcriptBox.scrollHeight;
    }

    function finishSession(outcome, finalPrice) {
      if (sessionDone) return;
      sessionDone = true;
      state.outcome = outcome;
      state.finalPrice = finalPrice;
      showScreen('result');
    }

    var negotiation;
    try {
      negotiation = await startNegotiation(state, appendTranscript, finishSession);
    } catch(e) {
      appendTranscript('<span style="color:var(--red)">Failed to start: ' + e.message + '</span>');
      return;
    }

    document.getElementById('deal-btn').onclick = function() {
      var price = parseFloat(document.getElementById('final-price-input').value) || state.maxPrice;
      negotiation.stop(); finishSession('deal', price);
    };
    document.getElementById('walkaway-btn').onclick = function() {
      negotiation.stop(); finishSession('walkaway', null);
    };
    document.getElementById('mute-btn').onclick = function(e) {
      isMuted = !isMuted;
      negotiation.mute(isMuted);
      e.target.textContent = isMuted ? 'Unmute Mic' : 'Mute Mic';
      e.target.style.color = isMuted ? 'var(--red)' : '';
      e.target.style.borderColor = isMuted ? 'rgba(255,59,59,0.4)' : '';
    };
    document.getElementById('stop-neg-btn').onclick = function() {
      negotiation.stop(); showScreen('location');
    };
  }

  // ─── SCREEN: RESULT ───────────────────────────────────────────────────────
  function initResultScreen() {
    var container = document.getElementById('screen-result');
    var isDeal = state.outcome === 'deal';

    if (isDeal) {
      var quotedUsd = parseFloat((state.analysis && state.analysis.quoted_price_usd) || 0);
      var saved = Math.max(0, quotedUsd - (state.finalPrice || 0)).toFixed(2);
      container.innerHTML =
        '<div style="text-align:center;padding:48px 0 32px;">' +
          '<div style="font-size:72px;line-height:1;margin-bottom:16px;">🤝</div>' +
          '<h1 style="font-size:32px;color:var(--green);margin-bottom:8px;">Deal Closed!</h1>' +
          '<p style="color:var(--muted);font-size:14px;">You negotiated like a local.</p>' +
        '</div>' +

        '<div class="card-accent" style="text-align:center;margin-bottom:14px;">' +
          '<div class="tag">You paid</div>' +
          '<div class="price-hero" style="font-size:48px;margin:6px 0;">$' + state.finalPrice + '</div>' +
          '<hr class="divider">' +
          '<div style="display:flex;justify-content:center;gap:32px;">' +
            '<div>' +
              '<div class="tag">You saved</div>' +
              '<div style="font-family:Syne,sans-serif;font-weight:800;font-size:24px;color:var(--green);">$' + saved + '</div>' +
            '</div>' +
            '<div>' +
              '<div class="tag">They asked</div>' +
              '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:24px;color:var(--muted2);text-decoration:line-through;">$' + quotedUsd.toFixed(2) + '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        '<p style="font-size:12px;color:var(--muted2);text-align:center;margin-bottom:20px;">' +
          (state.analysis && state.analysis.product_description) + ' · ' + (state.location && state.location.city) +
        '</p>' +

        '<button id="shop-another-btn" class="btn-primary">Shop Another Item →</button>' +
        '<button id="new-loc-btn" class="btn-secondary">Change Location</button>';

      document.getElementById('shop-another-btn').onclick = function() { showScreen('capture'); };
      document.getElementById('new-loc-btn').onclick = function() { showScreen('location'); };
    } else {
      container.innerHTML =
        '<div style="text-align:center;padding:48px 0 32px;">' +
          '<div style="font-size:72px;line-height:1;margin-bottom:16px;">💪</div>' +
          '<h1 style="font-size:32px;margin-bottom:8px;">Budget Held!</h1>' +
          '<p style="color:var(--muted);font-size:14px;line-height:1.6;">Their best offer didn\'t meet your limit.<br>Smart move — another stall awaits.</p>' +
        '</div>' +

        '<button id="try-again-btn" class="btn-primary">Try Again →</button>' +
        '<button id="new-item-btn" class="btn-secondary">New Item</button>' +
        '<button id="new-loc-result-btn" class="btn-secondary">New Location</button>';

      document.getElementById('try-again-btn').onclick = function() { showScreen('preferences'); };
      document.getElementById('new-item-btn').onclick = function() { showScreen('capture'); };
      document.getElementById('new-loc-result-btn').onclick = function() { showScreen('location'); };
    }
  }

  // ─── START ────────────────────────────────────────────────────────────────
  showScreen('location');
  </script>
</body>
</html>
