<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BargainBuddy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #080808;
      --bg2:      #111111;
      --bg3:      #1a1a1a;
      --border:   #222222;
      --green:    #00FF88;
      --green-dim:#00cc6a;
      --orange:   #FF6B35;
      --gold:     #FFD60A;
      --red:      #FF3B3B;
      --text:     #FFFFFF;
      --muted:    #666666;
      --muted2:   #444444;
      --radius-lg:20px;
      --radius-md:14px;
      --radius-sm:10px;
      --glow-green: 0 0 24px rgba(0,255,136,0.35);
      --glow-orange: 0 0 24px rgba(255,107,53,0.35);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Manrope', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 20px 40px;
      overflow-x: hidden;
    }

    /* ── Typography ── */
    h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 26px;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }
    h3 { font-family: 'Syne', sans-serif; font-weight: 700; }
    label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }

    /* ── Screen ── */
    .screen { width: 100%; animation: fadeUp 0.35s ease both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card ── */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 14px;
    }
    .card-accent {
      background: var(--bg2);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: 14px;
      border: 1px solid transparent;
      background-clip: padding-box;
      position: relative;
    }
    .card-accent::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: calc(var(--radius-lg) + 1px);
      background: linear-gradient(135deg, var(--green) 0%, var(--orange) 100%);
      z-index: -1;
    }

    /* ── Inputs ── */
    input, select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 15px;
      font-family: 'Manrope', sans-serif;
      font-weight: 500;
      margin-top: 0;
      outline: none;
      transition: border-color 200ms, box-shadow 200ms;
      -webkit-appearance: none;
    }
    input:focus, select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(0,255,136,0.12);
    }
    select { cursor: pointer; }

    /* ── Buttons ── */
    button {
      min-height: 52px;
      padding: 14px 24px;
      border-radius: var(--radius-md);
      border: none;
      font-size: 15px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: all 200ms ease;
    }
    .btn-primary {
      background: var(--green);
      color: #000;
      box-shadow: var(--glow-green);
    }
    .btn-primary:hover {
      background: #1aff99;
      box-shadow: 0 0 36px rgba(0,255,136,0.5);
      transform: translateY(-1px);
    }
    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      background: var(--bg3);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: #444; background: #1f1f1f; }

    .btn-danger {
      background: rgba(255,59,59,0.12);
      color: var(--red);
      border: 1px solid rgba(255,59,59,0.3);
    }
    .btn-danger:hover { background: rgba(255,59,59,0.2); }

    /* ── Tone Buttons ── */
    .tone-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; width: 100%; box-sizing: border-box; }
    .tone-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      min-height: 44px;
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      border-radius: var(--radius-sm);
      width: 100%;
      box-sizing: border-box;
      padding: 0 4px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }
    .tone-btn.active {
      background: rgba(0,255,136,0.1);
      color: var(--green);
      border-color: var(--green);
    }

    /* ── Location Pill ── */
    .location-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 14px 6px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 20px;
      cursor: pointer;
      transition: border-color 200ms, color 200ms;
    }
    .location-pill:hover { border-color: #444; color: #999; }
    .location-pill svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── Live Dot ── */
    .live-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      display: inline-block;
      margin-right: 6px;
      animation: pulse 1.2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--red);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }

    /* ── Transcript ── */
    .transcript {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      height: 260px;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.7;
      color: #aaa;
      margin-top: 14px;
      font-family: 'Manrope', sans-serif;
    }
    .transcript::-webkit-scrollbar { width: 4px; }
    .transcript::-webkit-scrollbar-track { background: transparent; }
    .transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Badges ── */
    .badge-high   { background: rgba(255,59,59,0.12); color: #FF6B6B; border: 1px solid rgba(255,59,59,0.25); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge-medium { background: rgba(255,166,0,0.12); color: #FFAA00; border: 1px solid rgba(255,166,0,0.25); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
    .badge-low    { background: rgba(0,255,136,0.10); color: var(--green); border: 1px solid rgba(0,255,136,0.25); border-radius: 8px; padding: 4px 10px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }

    /* ── Preview ── */
    .preview-img {
      width: 100%;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      margin-bottom: 14px;
      display: block;
    }

    /* ── Camera Viewfinder ── */
    #camera-viewfinder {
      width: 100%; aspect-ratio: 3/4;
      background: #000; border-radius: var(--radius-lg);
      object-fit: cover; margin-bottom: 14px;
      border: 1px solid var(--border);
    }

    /* ── Upload Area ── */
    .upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius-lg);
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 200ms, background 200ms;
      margin-bottom: 14px;
    }
    .upload-area:hover { border-color: var(--green); background: rgba(0,255,136,0.04); }

    /* ── Modal ── */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: var(--radius-lg);
      width: 92%;
      max-width: 400px;
    }
    .modal-content h3 { margin-bottom: 16px; font-size: 18px; }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
      margin-top: 8px;
    }
    .logo-wrap img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    .logo-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, var(--green), var(--orange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .logo-tagline {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Divider ── */
    .divider { border: 0; border-top: 1px solid var(--border); margin: 20px 0; }

    /* ── Savings number ── */
    .price-hero {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      color: var(--green);
      line-height: 1;
    }
    .price-strikethrough {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      color: var(--muted2);
      text-decoration: line-through;
      text-decoration-color: var(--red);
    }

    /* ── Tag label ── */
    .tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* ── Loading spinner ── */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mobile — safe areas, touch, zoom prevention ── */
    @media (max-width: 480px) {
      body {
        padding: 20px 16px calc(32px + env(safe-area-inset-bottom));
        /* Prevent iOS bounce scroll on body */
        overscroll-behavior-y: none;
      }
      h1 { font-size: 22px; }
      .logo-wrap img { width: 68px; height: 68px; }
      .logo-name { font-size: 24px; }
      /* Larger touch targets on small screens */
      button { min-height: 52px; font-size: 15px; }
      .tone-btn { min-height: 46px; }
      /* Keep font-size 16px+ on inputs to prevent iOS auto-zoom */
      input, select { font-size: 16px; }
      /* Tighter card padding on very small screens */
      .card, .card-accent { padding: 16px; }
      /* Price hero scales down */
      .price-hero[style*="font-size:64px"] { font-size: 52px !important; }
      .price-hero[style*="font-size:48px"] { font-size: 40px !important; }
      /* Upload area compact */
      .upload-area { padding: 28px 16px; }
      /* Transcript height on mobile */
      .transcript { height: 220px; }
    }

    /* ── Very small phones ── */
    @media (max-width: 360px) {
      body { padding-left: 12px; padding-right: 12px; }
      h1 { font-size: 20px; }
      .logo-name { font-size: 22px; }
    }

    /* ── iOS standalone / PWA mode ── */
    @supports (-webkit-touch-callout: none) {
      body { padding-top: calc(20px + env(safe-area-inset-top)); }
    }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      *, .screen, .live-dot, .spinner { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div id="screen-location" class="screen"></div>
  <div id="screen-capture" class="screen" style="display:none;"></div>
  <div id="screen-analysis" class="screen" style="display:none;"></div>
  <div id="screen-preferences" class="screen" style="display:none;"></div>
  <div id="screen-negotiation" class="screen" style="display:none;"></div>
  <div id="screen-text-negotiation" class="screen" style="display:none;"></div>
  <div id="screen-result" class="screen" style="display:none;"></div>

  <div id="location-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h3>Change Location</h3>
      <label>City, Country</label>
      <input type="text" id="modal-location-input" placeholder="Mumbai, India">
      <div style="margin-top:14px;">
        <label>Merchant Language</label>
        <select id="modal-language-select"></select>
      </div>
      <button id="modal-update-btn" class="btn-primary" style="margin-top:16px;">Update</button>
      <button id="modal-close-btn" class="btn-secondary">Cancel</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
  // ─── CONFIG ───────────────────────────────────────────────────────────────
  // config.js (gitignored) sets window.CONFIG with the real key locally.
  // On GitHub Pages the Action injects the key into the placeholder below.
  if (typeof CONFIG === 'undefined') {
    var CONFIG = { GEMINI_API_KEY: 'YOUR_API_KEY_HERE' };
  }

  // ─── APP STATE ────────────────────────────────────────────────────────────
  var state = {
    location: null,
    detectedLanguage: null,
    analysis: null,
    imageBase64: null,
    imageMimeType: null,
    productDescription: '',
    merchantAskedPrice: null,   // raw string e.g. "600 INR" or "600"
    maxPrice: null,
    tone: 'friendly',
    mode: 'audio',
    voice: 'Puck',
    outcome: null,
    finalPrice: null,
  };

  var LANGUAGES = [
    'Auto-detect',
    'Thai', 'Japanese', 'Mandarin Chinese', 'Korean',
    'Arabic', 'Moroccan Arabic (Darija)', 'Turkish', 'Hindi',
    'Vietnamese', 'Indonesian (Bahasa)', 'Khmer', 'Nepali',
    'Spanish', 'Portuguese', 'French', 'Italian',
    'German', 'Russian', 'Swahili', 'English'
  ];

  // ─── SCREEN ROUTER ────────────────────────────────────────────────────────
  function showScreen(name) {
    document.querySelectorAll('.screen').forEach(function(s) { s.style.display = 'none'; });
    var el = document.getElementById('screen-' + name);
    el.style.display = 'block';
    // Re-trigger animation
    el.classList.remove('screen');
    void el.offsetWidth;
    el.classList.add('screen');
    switch (name) {
      case 'location':    initLocationScreen();    break;
      case 'capture':     initCaptureScreen();     break;
      case 'analysis':    initAnalysisScreen();    break;
      case 'preferences': initPreferencesScreen(); break;
      case 'negotiation': initNegotiationScreen(); break;
      case 'text-negotiation': initTextNegotiationScreen(); break;
      case 'result':      initResultScreen();      break;
    }
  }

  function renderLocationPill(container) {
    if (!state.location) return;
    var pill = document.createElement('div');
    pill.className = 'location-pill';
    pill.innerHTML =
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>' +
      (state.location.city || state.location.country) + ' · ' + state.detectedLanguage +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left:2px;opacity:0.5;"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
    pill.onclick = openLocationModal;
    container.prepend(pill);
  }

  function openLocationModal() {
    var modal = document.getElementById('location-modal');
    var input = document.getElementById('modal-location-input');
    var select = document.getElementById('modal-language-select');
    input.value = state.location.city + ', ' + state.location.country;
    select.innerHTML = '';
    LANGUAGES.forEach(function(lang) {
      var opt = document.createElement('option');
      opt.value = lang; opt.textContent = lang;
      if (lang === state.detectedLanguage) opt.selected = true;
      select.appendChild(opt);
    });
    modal.style.display = 'flex';
  }

  document.getElementById('modal-close-btn').onclick = function() {
    document.getElementById('location-modal').style.display = 'none';
  };

  document.getElementById('modal-update-btn').onclick = function() {
    var locStr = document.getElementById('modal-location-input').value;
    var lang = document.getElementById('modal-language-select').value;
    var parts = locStr.split(',').map(function(s) { return s.trim(); });
    state.location = { city: parts[0] || '', country: parts[1] || '' };
    state.detectedLanguage = lang;
    document.getElementById('location-modal').style.display = 'none';
    if (document.getElementById('screen-analysis').style.display === 'block') {
      initAnalysisScreen();
    } else {
      var cur = document.querySelector('.screen[style*="display: block"]');
      if (cur) showScreen(cur.id.replace('screen-', ''));
    }
  };

  // ─── GEMINI VISION (direct REST) ─────────────────────────────────────────
  async function analyzeProduct(base64Image, mimeType, location, productDescription) {
    var apiKey = (window.CONFIG || CONFIG).GEMINI_API_KEY;
    if (!apiKey || apiKey.includes('PASTE')) throw new Error('Invalid API Key');

    var merchantNote = state.merchantAskedPrice
      ? 'Merchant verbally quoted: "' + state.merchantAskedPrice + '" — use this as quoted_price, overriding anything in the image.'
      : 'Look for any visible price tag or sticker in the image. If found, use it. If not, estimate the typical tourist ask for this item in ' + location.city + '.';

    var prompt =
      'OUTPUT FORMAT: respond with ONLY a single JSON object. No markdown, no text before or after, no code fences.\n\n' +
      'TASK: You are a street-market price expert in ' + location.city + ', ' + location.country + '.\n' +
      'Item: "' + productDescription + '"\n' +
      'Quoted price: ' + merchantNote + '\n\n' +
      'Provide the following JSON object with ALL fields filled in with realistic values:\n' +
      '{"product_description":"short description of the item","quoted_price":"merchant asking price with currency","quoted_currency":"currency code e.g. CNY INR THB","quoted_price_usd":13.79,"suggested_usd":4.50,"suggested_local":"55 RMB","local_context":"one sentence on typical pricing here","reasoning":"one sentence on why the markup exists","negotiation_floor":2.50,"tourist_markup":"high"}\n\n' +
      'Rules:\n' +
      '- quoted_price_usd: USD value of the merchant ask using real exchange rates for ' + location.country + '\n' +
      '- suggested_usd: what locals actually pay — NOT the tourist price\n' +
      '- suggested_local: suggested_usd converted back to local currency\n' +
      '- tourist_markup: "low" "medium" or "high" only\n' +
      '- All numbers must be realistic for ' + location.city + ' — do not use placeholder values';

    var response = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [
            { inlineData: { mimeType: mimeType || 'image/jpeg', data: base64Image } },
            { text: prompt }
          ]}],
          generationConfig: {
            responseMimeType: 'application/json',
            responseSchema: {
              type: 'object',
              properties: {
                product_description: { type: 'string' },
                quoted_price:        { type: 'string' },
                quoted_currency:     { type: 'string' },
                quoted_price_usd:    { type: 'number' },
                suggested_usd:       { type: 'number' },
                suggested_local:     { type: 'string' },
                local_context:       { type: 'string' },
                reasoning:           { type: 'string' },
                negotiation_floor:   { type: 'number' },
                tourist_markup:      { type: 'string' }
              },
              required: ['product_description','quoted_price','quoted_currency','quoted_price_usd','suggested_usd','suggested_local','tourist_markup']
            }
          }
        })
      }
    );

    var data = await response.json();
    if (!response.ok) throw new Error(data.error?.message || 'API error ' + response.status);

    var candidate = data.candidates?.[0];
    if (!candidate) throw new Error('No response from model');
    var rawText = (candidate.content?.parts?.[0]?.text) || '';
    if (!rawText) throw new Error('Empty model response (finishReason: ' + (candidate.finishReason || '?') + ')');

    // responseMimeType:application/json guarantees clean JSON — parse directly
    // Strip any accidental fences as a safety net, then parse
    var cleaned = rawText.replace(/```json|```/gi, '').trim();
    try { return JSON.parse(cleaned); } catch(e) {
      // Last resort: extract first {...} block
      var m = cleaned.match(/\{[\s\S]*\}/);
      if (m) return JSON.parse(m[0]);
      throw new Error('Could not parse model response: ' + rawText.slice(0, 100));
    }
  }

  // ─── GEMINI LIVE (WebSocket) ──────────────────────────────────────────────
  var LIVE_WS_URL = 'wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent';

  async function startNegotiation(negotiationState, onTranscript, onDone) {
    var apiKey = (window.CONFIG || CONFIG).GEMINI_API_KEY;
    if (!apiKey || apiKey.includes('PASTE')) throw new Error('Invalid API Key');

    var micStream, captureCtx, playbackCtx, micSource, processor, ws;
    var isMuted = false, sessionEnded = false;
    var playbackQueue = Promise.resolve();

    micStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    captureCtx = new AudioContext({ sampleRate: 16000 });
    await captureCtx.resume();
    playbackCtx = new AudioContext({ sampleRate: 24000 });
    await playbackCtx.resume();

    return new Promise(function(resolve, reject) {
      ws = new WebSocket(LIVE_WS_URL + '?key=' + apiKey);
      ws.binaryType = 'arraybuffer';

      ws.onopen = function() {
        ws.send(JSON.stringify({
          setup: {
            model: 'models/gemini-2.5-flash-native-audio-latest',
            systemInstruction: { parts: [{ text: buildSystemPrompt(negotiationState) }] },
            generationConfig: { responseModalities: ['AUDIO'] }
          }
        }));
      };

      var _turnCount = 0, _inTurn = false;

      ws.onmessage = function(event) {
        var msg;
        try {
          var text = event.data instanceof ArrayBuffer
            ? new TextDecoder().decode(event.data)
            : event.data;
          msg = JSON.parse(text);
        } catch(e) { console.error('WS parse error:', e); return; }

        if (msg.setupComplete) {
          startMicCapture();
          var lang = negotiationState.detectedLanguage === 'Auto-detect' ? 'the local language' : negotiationState.detectedLanguage;
          ws.send(JSON.stringify({
            clientContent: {
              turns: [{ role: 'user', parts: [{ text: 'Begin the negotiation now in ' + lang + '. Make your opening offer immediately.' }] }],
              turnComplete: true
            }
          }));
          onTranscript({ type: 'connected' });
          resolve({ stop: stopEverything, mute: function(val) { isMuted = val; } });
          return;
        }

        var sc = msg.serverContent;
        if (!sc) return;

        var parts = (sc.modelTurn && sc.modelTurn.parts) || [];
        var hasAudio = false;
        parts.forEach(function(part) {
          if (part.inlineData && part.inlineData.data) { enqueueAudio(part.inlineData.data); hasAudio = true; }
        });
        if (hasAudio && !_inTurn) { _inTurn = true; _turnCount++; onTranscript({ type: 'speaking', turn: _turnCount }); }
        if (sc.turnComplete && _inTurn) { _inTurn = false; onTranscript({ type: 'listening', turn: _turnCount }); }
      };

      ws.onerror = function(e) {
        console.error('WebSocket error:', e);
        if (!sessionEnded) {
          sessionEnded = true;
          onTranscript('<span style="color:var(--red)">Connection error — check API key.</span>');
          cleanup(); reject(new Error('WebSocket connection failed'));
        }
      };

      ws.onclose = function(e) {
        console.warn('WebSocket closed — code: ' + e.code + ', reason: "' + e.reason + '"');
        if (!sessionEnded) {
          sessionEnded = true;
          cleanup();
          // Natural close (1000/1001) = AI finished the session; anything else = error
          if (e.code === 1000 || e.code === 1001 || !e.code) {
            onTranscript({ type: 'session_ended' });
            resolve({ stop: function(){}, mute: function(){} }); // don't reject — let user pick outcome
          } else {
            var detail = e.reason ? ': ' + e.reason : ' (code ' + e.code + ')';
            onTranscript('<span style="color:#FFAA00">Session disconnected' + detail + '.</span>');
            reject(new Error('WebSocket closed: ' + (e.reason || e.code)));
          }
        }
      };

      function startMicCapture() {
        micSource = captureCtx.createMediaStreamSource(micStream);
        processor = captureCtx.createScriptProcessor(4096, 1, 1);
        processor.onaudioprocess = function(e) {
          if (isMuted || sessionEnded || !ws || ws.readyState !== WebSocket.OPEN) return;
          var float32 = e.inputBuffer.getChannelData(0);
          var int16 = new Int16Array(float32.length);
          for (var i = 0; i < float32.length; i++) {
            int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
          }
          var bytes = new Uint8Array(int16.buffer);
          var binary = '';
          for (var j = 0; j < bytes.length; j++) binary += String.fromCharCode(bytes[j]);
          ws.send(JSON.stringify({
            realtimeInput: { mediaChunks: [{ mimeType: 'audio/pcm;rate=16000', data: btoa(binary) }] }
          }));
        };
        micSource.connect(processor);
        processor.connect(captureCtx.destination);
      }

      function enqueueAudio(base64) {
        playbackQueue = playbackQueue.then(function() {
          return new Promise(function(res) {
            try {
              var binary = atob(base64);
              var bytes = new Uint8Array(binary.length);
              for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
              var numSamples = Math.floor(bytes.length / 2);
              var float32 = new Float32Array(numSamples);
              var view = new DataView(bytes.buffer);
              for (var j = 0; j < numSamples; j++) float32[j] = view.getInt16(j * 2, true) / 32768.0;
              var audioBuffer = playbackCtx.createBuffer(1, numSamples, 24000);
              audioBuffer.copyToChannel(float32, 0);
              var source = playbackCtx.createBufferSource();
              source.buffer = audioBuffer;
              source.connect(playbackCtx.destination);
              source.onended = res;
              source.start();
            } catch(e) { console.error('Audio playback error:', e); res(); }
          });
        });
      }

      function stopEverything() {
        sessionEnded = true;
        if (processor) { try { processor.disconnect(); } catch(_) {} }
        if (micSource)  { try { micSource.disconnect(); } catch(_) {} }
        if (micStream)  micStream.getTracks().forEach(function(t) { t.stop(); });
        if (ws && ws.readyState === WebSocket.OPEN) ws.close();
      }

      function cleanup() {
        if (captureCtx && captureCtx.state !== 'closed') captureCtx.close();
        if (playbackCtx && playbackCtx.state !== 'closed') playbackCtx.close();
      }
    });
  }

  function buildSystemPrompt(s) {
    var a = s.analysis;
    var lang = s.detectedLanguage === 'Auto-detect' ? 'the local language' : s.detectedLanguage;
    // Compute walk-away in local currency for the prompt
    var exchRate = null;
    var qLocal = parseFloat(a.quoted_price || ''), qUsd = Number(a.quoted_price_usd || 0);
    var sLocal = parseFloat(a.suggested_local || ''), sUsd = Number(a.suggested_usd || 0);
    if (qLocal > 0 && qUsd > 0) exchRate = qLocal / qUsd;
    else if (sLocal > 0 && sUsd > 0) exchRate = sLocal / sUsd;
    var currCode = a.quoted_currency || (a.suggested_local || '').replace(/[\d\s.,]/g, '').trim() || '';
    var maxLocal = (exchRate && currCode && s.maxPrice) ? Math.round(Number(s.maxPrice) * exchRate) + ' ' + currCode : null;
    var maxPriceStr = maxLocal ? maxLocal + ' ($' + s.maxPrice + ' USD)' : '$' + s.maxPrice + ' USD';

    return 'You are BargainBuddy, a voice AI negotiating at a market in ' + s.location.city + ', ' + s.location.country + '.\n\n' +

      '=== CRITICAL RULES — MUST FOLLOW EXACTLY ===\n\n' +

      'RULE 1 — ENGLISH NARRATION (the tourist does NOT speak ' + lang + '):\n' +
      'After EVERY merchant response, say a SHORT English update FIRST before continuing in ' + lang + '.\n' +
      'The English update format depends on what the merchant said:\n\n' +
      '  • If merchant quoted a NEW price: "Merchant says: [price]"\n' +
      '    Example: "Merchant says: 80 RMB" → continue in ' + lang + '\n\n' +
      '  • If merchant REFUSED to lower price (e.g. "no no cannot", "this is my best", "not possible"):\n' +
      '    "Merchant holding firm — [brief context]"\n' +
      '    Example: "Merchant holding firm — says this is genuine handmade" → continue in ' + lang + '\n\n' +
      '  • If merchant said something unrelated to price (greeting, story, compliment):\n' +
      '    "Merchant says: [translation of what they said]"\n' +
      '    Example: "Merchant says: his family made this for 20 years" → continue in ' + lang + '\n\n' +
      '  • If merchant is hesitating, thinking, or gave a non-answer:\n' +
      '    "Merchant is considering — I am applying pressure"\n\n' +
      'CRITICAL: NEVER invent or state a price the merchant did not actually say.\n' +
      'If merchant did NOT name a new price, do NOT say "Merchant says: [number]" — describe what they actually communicated.\n' +
      'The English phrase MUST be in English Roman letters. NEVER say it in ' + lang + ' characters or ' + lang + ' words.\n\n' +

      'RULE 2 — DEAL SIGNAL (say this in English when deal is agreed):\n' +
      '  "Deal confirmed: [price] [currency]"\n' +
      'Example: "Deal confirmed: 55 RMB" — say this in ENGLISH before ending in ' + lang + '.\n\n' +

      'RULE 3 — WALK AWAY SIGNAL (say this in English when giving up):\n' +
      '  "Walk away" — say this single English phrase, then say goodbye in ' + lang + '.\n\n' +

      'RULE 4 — OPENING COUNTER-OFFER:\n' +
      'Your walk-away limit is ' + maxPriceStr + '. This is the MAXIMUM you will ever pay.\n' +
      'Open 30-40% BELOW the walk-away limit to leave room to negotiate up.\n' +
      'Opening offer = roughly ' + (maxLocal ? Math.round(Number(s.maxPrice) * 0.62 * (exchRate || 1)) + ' ' + currCode : '$' + (Number(s.maxPrice) * 0.62).toFixed(2)) + ' — start here, work up slowly.\n' +
      'NEVER start at or above the walk-away limit — there would be no room to negotiate.\n\n' +

      '=== NEGOTIATION DETAILS ===\n' +
      'Product: ' + a.product_description + '\n' +
      'Merchant asking: ' + a.quoted_price + ' ' + (currCode || '') + '\n' +
      'Fair market price (your target): ' + a.suggested_local + '\n' +
      'Walk-away limit: ' + maxPriceStr + '\n' +
      'Style: ' + s.tone + '\n\n' +

      'Negotiate in ' + lang + '. Concede slowly. Aim for the fair market price. Use the English signals above so the tourist always knows what is happening.';
  }


  // ─── GEMINI TEXT NEGOTIATION (REST) ──────────────────────────────────────
  async function startTextNegotiation(state, onMessage) {
    var apiKey = (window.CONFIG || CONFIG).GEMINI_API_KEY;
    if (!apiKey || apiKey === 'YOUR_API_KEY_HERE') throw new Error('No API key found. Add your Gemini API key.');

    var a = state.analysis || {};
    var lang = state.detectedLanguage || 'the local language';
    var currCode = state.currCode || '';
    var maxPriceStr = state.maxPrice ? '$' + state.maxPrice + ' USD' : 'unknown';
    var product = a.product_description || 'this item';
    var location = (state.location && state.location.city) ? state.location.city : 'this market';
    var openingOffer = state.maxPrice ? Math.round(state.maxPrice * 0.60) : null;
    var openingStr = openingOffer ? '$' + openingOffer + ' USD' : 'about 60% of the walk-away limit';

    var systemPrompt =
      '⚠️ NEVER break character. NEVER say "I\'m sorry", "we seem stuck", "as an AI", or any meta-commentary. You are a human negotiator. Just keep negotiating.\n' +
      '⚠️ NEVER assume the merchant\'s gender. Do NOT use gendered address forms such as "auntie", "uncle", "sir", "ma\'am", "阿姨", "叔叔", "おばさん", "คุณป้า" etc. Address the merchant neutrally at all times.\n\n' +

      'You are negotiating prices at a market in ' + location + ' on behalf of a tourist. The merchant speaks ' + lang + '. The tourist does not speak ' + lang + '.\n' +
      'The phone screen is shared — the merchant reads the LOCAL field, the tourist reads the EN field.\n\n' +

      'EVERY reply must use EXACTLY this format (all 5 fields required, no extra text):\n' +
      'LOCAL: [1-3 sentence message in ' + lang + ' addressed to the merchant]\n' +
      'EN: [English translation for the tourist]\n' +
      'YES: [Short ' + lang + ' phrase the merchant taps if they AGREE to lower the price / accept the current offer]\n' +
      'NO: [Short ' + lang + ' phrase the merchant taps if they REFUSE — price cannot go lower]\n' +
      'SUGGEST: [Short ' + lang + ' phrase the merchant taps to NAME their own counter-price]\n\n' +

      'CONTEXT:\n' +
      '- Item: ' + product + '\n' +
      '- Merchant originally asked: ' + (a.quoted_price || 'unknown') + '\n' +
      '- Your walk-away maximum (NEVER reveal this): ' + maxPriceStr + '\n' +
      '- Start around: ' + openingStr + '\n' +
      '- Tone: ' + (state.tone || 'friendly') + '\n\n' +

      'RULES:\n' +
      '- Every turn: genuinely varied negotiation language. No repeated phrases.\n' +
      '- Concede slowly, max 10-15% per turn. Never go above walk-away limit.\n' +
      '- Use techniques across turns: anchor low, show disappointment, mention alternatives, hint at leaving.\n' +
      '- Messages SHORT (1-3 sentences). Sound like a real person, not a script.\n' +
      '- YES/NO/SUGGEST labels must always be fresh and natural for the current context.\n\n' +

      'OPTIONAL SIGNALS — add on own line after SUGGEST only when truly appropriate:\n' +
      'DEAL: [final agreed price] ' + currCode + '\n' +
      'WALKAWAY\n\n' +

      'Begin now with your opening message.';

    var history = [];

    async function sendMessage(userMsg) {
      if (userMsg) history.push({ role: 'user', parts: [{ text: userMsg }] });
      var contents = history.length
        ? history
        : [{ role: 'user', parts: [{ text: 'Begin the negotiation now.' }] }];
      var body = {
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: contents,
        generationConfig: {
          temperature: 0.85,
          maxOutputTokens: 400,
          thinkingConfig: { thinkingBudget: 0 }
        }
      };
      var res = await fetch(
        'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey,
        { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) }
      );
      if (!res.ok) {
        var errData = await res.json().catch(function() { return {}; });
        var msg = (errData.error && errData.error.message) || ('API error ' + res.status);
        throw new Error(msg);
      }
      var data = await res.json();
      // Gemini 2.5 Flash may return thinking tokens in parts marked thought:true — skip those
      var rawParts = (data.candidates[0].content.parts || []);
      var text = rawParts
        .filter(function(p) { return !p.thought && typeof p.text === 'string'; })
        .map(function(p) { return p.text; })
        .join('')
        .trim();
      history.push({ role: 'model', parts: [{ text: text }] });
      onMessage(text);
    }

    await sendMessage(null);
    return { send: sendMessage };
  }

  function tryGPS() {
    return new Promise(function(resolve) {
      if (!navigator.geolocation) return resolve(null);
      navigator.geolocation.getCurrentPosition(
        async function(pos) {
          var lat = pos.coords.latitude, lon = pos.coords.longitude;
          try {
            var res = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json');
            var data = await res.json();
            resolve({ city: data.address.city || data.address.town || data.address.village || '', country: data.address.country || '' });
          } catch(e) { resolve(null); }
        },
        function() { resolve(null); },
        { timeout: 5000 }
      );
    });
  }

    renderLocationPill(document.getElementById('pill-container-analysis'));

    analyzeProduct(state.imageBase64, state.imageMimeType || 'image/jpeg', state.location, state.productDescription)
      .then(function(result) {
        state.analysis = result;
        displayAnalysisResult(result, false);
      })
      .catch(function(e) {
        console.error('Analysis error:', e);
        // Show a visible API error so user knows something is wrong
        var msg = e.message || 'Unknown error';
        var isKeyError = msg.toLowerCase().indexOf('api') !== -1 || msg.toLowerCase().indexOf('key') !== -1 || msg.toLowerCase().indexOf('invalid') !== -1 || msg.toLowerCase().indexOf('401') !== -1 || msg.toLowerCase().indexOf('403') !== -1;
        document.getElementById('loading-area').innerHTML =
          '<div style="text-align:center;padding:20px 0;">' +
            '<div style="font-size:40px;margin-bottom:12px;">⚠️</div>' +
            '<p style="font-family:Syne,sans-serif;font-weight:700;font-size:16px;margin-bottom:8px;color:var(--orange);">' + (isKeyError ? 'API Key Error' : 'Analysis Failed') + '</p>' +
            '<p style="color:var(--muted);font-size:13px;margin-bottom:16px;line-height:1.6;">' + (isKeyError ? (typeof CONFIG !== "undefined" && CONFIG.GEMINI_API_KEY && CONFIG.GEMINI_API_KEY !== "YOUR_API_KEY_HERE" ? "The Gemini API key was rejected. Check it is valid and has the Gemini API enabled." : "No API key found. Add your Gemini API key — locally via <b>config.js</b>, or via GitHub Secrets for the deployed version.") : msg) + '</p>' +
            '<button onclick="showScreen(\'capture\')" class="btn-secondary" style="width:auto;padding:10px 24px;">← Go Back</button>' +
          '</div>';
        // Still set a minimal fallback so other screens don't break if user proceeds
        var fallback = {
          product_description: state.productDescription,
          quoted_price: state.merchantAskedPrice || null, quoted_currency: null,
          quoted_price_usd: null, suggested_usd: null, suggested_local: null,
          local_context: '', reasoning: '', negotiation_floor: null, tourist_markup: null
        };
        state.analysis = fallback;
      });
  }

  function displayAnalysisResult(res, isFallback) {
    // Safe coercions — block [object Object] if model returns wrong types
    function safeStr(v) {
      if (v == null) return null;
      if (typeof v === 'object') return null;
      var s = String(v).trim();
      return (s && s !== 'null' && s !== 'undefined') ? s : null;
    }
    function safeNum(v) {
      if (v == null) return null;
      var n = Number(v);
      return (!isNaN(n) && isFinite(n)) ? n : null;
    }

    var quotedPrice    = safeStr(res.quoted_price)    || safeStr(state.merchantAskedPrice) || null;
    var quotedPriceUsd = safeNum(res.quoted_price_usd);
    var suggestedLocal = safeStr(res.suggested_local) || null;
    var suggestedUsd   = safeNum(res.suggested_usd);

    // Always ensure a suggested price exists — fall back to 55% of merchant ask
    if (suggestedUsd == null && quotedPriceUsd != null) suggestedUsd = Math.round(quotedPriceUsd * 0.55 * 100) / 100;
    if (suggestedLocal == null && suggestedUsd != null) suggestedLocal = '$' + suggestedUsd.toFixed(2) + ' USD';
    var productDesc    = safeStr(res.product_description) || safeStr(state.productDescription) || '';
    var markup         = safeStr(res.tourist_markup) || null;
    var trulyNoData    = !quotedPrice && suggestedLocal == null && suggestedUsd == null;

    var badgeClass  = markup === 'high' ? 'badge-high' : (markup === 'medium' ? 'badge-medium' : 'badge-low');
    var markupLabel = markup ? markup + ' markup' : 'price analysis';

    var savingsPct = (quotedPriceUsd && suggestedUsd && quotedPriceUsd > suggestedUsd)
      ? Math.round((1 - suggestedUsd / quotedPriceUsd) * 100) : null;
    var savedUsd   = savingsPct ? (quotedPriceUsd - suggestedUsd).toFixed(2) : null;

    // Render "local · $X.XX USD" — never renders objects or raw floats
    function pricePair(localStr, usdNum, strikethrough, color) {
      var parts = [];
      if (localStr != null)                  parts.push(localStr);
      if (usdNum  != null && !isNaN(usdNum)) parts.push('$' + Number(usdNum).toFixed(2) + ' USD');
      var combined = parts.length ? parts.join('  ·  ') : '—';
      var style = 'font-family:Manrope,sans-serif;font-weight:700;font-size:26px;line-height:1.2;color:' + (color || 'inherit') + ';';
      if (strikethrough) style += 'text-decoration:line-through;text-decoration-color:var(--red);text-decoration-thickness:2px;';
      return '<span style="' + style + '">' + combined + '</span>';
    }

    document.getElementById('loading-area').style.display = 'none';
    var area = document.getElementById('result-area');

    area.innerHTML =
      (trulyNoData ? '<p style="color:#FFAA00;font-size:12px;margin-bottom:16px;text-align:center;font-weight:600;letter-spacing:0.05em;">⚠ Could not read price — set amounts manually below</p>' : '') +

      '<div class="card" style="padding:0;overflow:hidden;">' +

        // ── Merchant's price
        '<div style="padding:18px 20px;border-bottom:1px solid var(--border);">' +
          '<p style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;">Merchant\'s price</p>' +
          pricePair(quotedPrice, quotedPriceUsd, true, 'var(--muted2)') +
          '<div style="margin-top:8px;">' +
            '<span class="' + badgeClass + '">' + markupLabel + '</span>' +
          '</div>' +
        '</div>' +

        // ── Savings ribbon
        (savingsPct ?
          '<div style="background:rgba(0,255,136,0.06);border-bottom:1px solid rgba(0,255,136,0.15);padding:9px 20px;display:flex;align-items:center;justify-content:space-between;">' +
            '<span style="font-size:12px;color:var(--green-dim);font-weight:600;">Max saving possible</span>' +
            '<span style="font-family:Manrope,sans-serif;font-size:13px;font-weight:700;color:var(--green);">$' + savedUsd + ' &nbsp;·&nbsp; −' + savingsPct + '%</span>' +
          '</div>'
        : '') +

        // ── Fair price
        '<div style="padding:18px 20px;">' +
          '<p style="font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--green);margin-bottom:8px;">Offer this price</p>' +
          pricePair(suggestedLocal, suggestedUsd, false, 'var(--green)') +
          (res.reasoning ? '<p style="font-size:12px;color:var(--muted2);margin-top:8px;line-height:1.5;">' + res.reasoning + '</p>' : '') +
        '</div>' +

      '</div>' +

      (productDesc ?
        '<p style="font-size:12px;color:var(--muted2);line-height:1.55;margin:10px 4px 20px;' +
          'overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">' +
          productDesc +
        '</p>'
      : '') +

      '<button id="set-budget-btn" class="btn-primary">Set My Budget →</button>';

    area.style.display = 'block';
    document.getElementById('set-budget-btn').onclick = function() { showScreen('preferences'); };
  }

  // ─── SCREEN: PREFERENCES ─────────────────────────────────────────────────
  function initPreferencesScreen() {
    var container = document.getElementById('screen-preferences');
    var a = state.analysis || {};

    // Derive currency and exchange rate from analysis data
    var currCode = state.currCode || a.quoted_currency || '';
    if (a.quoted_currency) state.currCode = a.quoted_currency;

    // Parse a local-currency number from strings like "100 RMB", "₹500", "฿80"
    function parseLocalNum(str) {
      if (!str) return null;
      var m = String(str).replace(/,/g,'').match(/\d+\.?\d*/);
      return m ? parseFloat(m[0]) : null;
    }
    var quotedLocalNum  = parseLocalNum(a.quoted_price);
    var fairLocalNum    = parseLocalNum(a.suggested_local);
    var quotedUsdNum    = a.quoted_price_usd  || null;
    var fairUsdNum      = a.suggested_usd     || null;

    // Approximate exchange rate
    var approxExchRate = 1;
    if (quotedLocalNum && quotedUsdNum) approxExchRate = quotedLocalNum / quotedUsdNum;
    else if (fairLocalNum && fairUsdNum) approxExchRate = fairLocalNum / fairUsdNum;
    state._approxExchRate = approxExchRate;

    // Default walk-away = (merchant asking + fair price) / 2
    var canUseLocal = !!currCode && quotedLocalNum != null && fairLocalNum != null;
    var defaultLocalVal = canUseLocal ? Math.round((quotedLocalNum + fairLocalNum) / 2) : null;
    var defaultUsdVal   = (quotedUsdNum && fairUsdNum) ? Math.round((quotedUsdNum + fairUsdNum) / 2 * 100) / 100
                          : (a.suggested_usd || state.maxPrice || '');
    // Step = 10% of price gap
    var localStep = canUseLocal ? Math.max(1, Math.round(Math.abs(quotedLocalNum - fairLocalNum) * 0.10)) : 5;
    var usdStep   = (quotedUsdNum && fairUsdNum) ? Math.max(0.5, Math.round(Math.abs(quotedUsdNum - fairUsdNum) * 0.10 * 100) / 100) : 1;

    var useLocalCurrency = canUseLocal;
    var currentStep = useLocalCurrency ? localStep : usdStep;

    // Helper: build a combined "local · $X USD" string
    function fmtBoth(localStr, usdNum) {
      var parts = [];
      if (localStr) parts.push(localStr);
      if (usdNum != null) parts.push('$' + usdNum + ' USD');
      return parts.length ? parts.join('  ·  ') : '—';
    }

    // Price context card
    var priceContextCard =
      '<div class="card" style="padding:0;overflow:hidden;margin-bottom:14px;">' +
        // Merchant's price row
        '<div style="padding:16px 20px;border-bottom:1px solid var(--border);">' +
          '<p style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;">Merchant asks</p>' +
          '<p style="font-family:Manrope,sans-serif;font-weight:700;font-size:20px;color:#777;line-height:1.2;">' +
            fmtBoth(a.quoted_price, a.quoted_price_usd) +
          '</p>' +
        '</div>' +
        // AI suggested row
        '<div style="padding:16px 20px;background:rgba(0,255,136,0.04);">' +
          '<p style="font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--green);margin-bottom:6px;">Fair price</p>' +
          '<p style="font-family:Manrope,sans-serif;font-weight:700;font-size:20px;color:var(--green);line-height:1.2;">' +
            fmtBoth(a.suggested_local, a.suggested_usd) +
          '</p>' +
        '</div>' +
      '</div>';

    container.innerHTML =
      '<div id="pill-container-prefs"></div>' +
      '<h1 style="margin-bottom:16px;">Set the rules</h1>' +

      priceContextCard +

      '<div class="card">' +
        '<label>Walk away if price stays above</label>' +
        '<div style="display:flex;align-items:center;gap:10px;margin-top:12px;">' +
          '<button id="max-price-minus" style="width:52px;height:52px;border-radius:14px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:26px;font-weight:300;cursor:pointer;touch-action:manipulation;flex-shrink:0;line-height:1;">−</button>' +
          '<div style="flex:1;display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;height:52px;">' +
            '<input type="number" id="max-price" inputmode="numeric" placeholder="0" style="flex:1;border:none;background:transparent;color:var(--text);font-family:Manrope,sans-serif;font-size:22px;font-weight:800;text-align:center;padding:0 4px;outline:none;min-width:0;">' +
            '<select id="max-price-currency" style="background:var(--bg2);border:none;border-left:1px solid var(--border);color:var(--text);font-family:Manrope,sans-serif;font-size:13px;font-weight:700;padding:0 10px;cursor:pointer;appearance:none;-webkit-appearance:none;outline:none;">' +
              (currCode ? '<option value="local">' + currCode + '</option>' : '') +
              '<option value="usd"' + (currCode ? '' : ' selected') + '>USD</option>' +
            '</select>' +
          '</div>' +
          '<button id="max-price-plus" style="width:52px;height:52px;border-radius:14px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:26px;font-weight:300;cursor:pointer;touch-action:manipulation;flex-shrink:0;line-height:1;">+</button>' +
        '</div>' +
      '</div>' +

      '<div class="card">' +
        '<label>Negotiation tone</label>' +
        '<div class="tone-group">' +
          '<button class="tone-btn ' + (state.tone === 'aggressive' ? 'active' : '') + '" data-tone="aggressive">Aggressive</button>' +
          '<button class="tone-btn ' + (state.tone === 'friendly' ? 'active' : '') + '" data-tone="friendly">Friendly</button>' +
          '<button class="tone-btn ' + (state.tone === 'neutral' ? 'active' : '') + '" data-tone="neutral">Neutral</button>' +
        '</div>' +
      '</div>' +

      '<div class="card">' +
        '<label>Negotiation mode</label>' +
        '<div class="tone-group" style="margin-top:10px;">' +
          '<button class="tone-btn mode-btn ' + (state.mode === 'audio' ? 'active' : '') + '" data-mode="audio">🎤 Audio</button>' +
          '<button class="tone-btn mode-btn ' + (state.mode === 'text' ? 'active' : '') + '" data-mode="text">💬 Text</button>' +
        '</div>' +
      '</div>' +

      '<div class="card" id="voice-card">' +
        '<label>AI Voice</label>' +
        '<div class="tone-group" style="margin-top:10px;">' +
          '<button class="voice-gender-btn" data-voice="Puck" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;">' +
            '<span style="font-size:22px;">👨</span><span style="font-size:13px;font-weight:700;">Male</span>' +
          '</button>' +
          '<button class="voice-gender-btn" data-voice="Kore" style="display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 8px;">' +
            '<span style="font-size:22px;">👩</span><span style="font-size:13px;font-weight:700;">Female</span>' +
          '</button>' +
        '</div>' +
      '</div>' +

      '<p style="font-size:12px;color:var(--muted);text-align:center;margin-bottom:4px;">Negotiating in <span style="color:var(--green);font-weight:700;">' + state.detectedLanguage + '</span></p>' +
      '<button id="start-neg-btn" class="btn-primary">Start Negotiating →</button>';

    renderLocationPill(document.getElementById('pill-container-prefs'));

    // ── Walk-away price controls ────────────────────────────────────────
    var maxPriceInput    = document.getElementById('max-price');
    var maxPriceCurrency = document.getElementById('max-price-currency');

    // Set initial value
    maxPriceInput.value = useLocalCurrency ? (defaultLocalVal || '') : (defaultUsdVal || '');
    if (maxPriceCurrency) maxPriceCurrency.value = useLocalCurrency ? 'local' : 'usd';

    document.getElementById('max-price-minus').onclick = function() {
      var v = parseFloat(maxPriceInput.value) || 0;
      maxPriceInput.value = Math.max(0, Math.round((v - currentStep) * 100) / 100);
    };
    document.getElementById('max-price-plus').onclick = function() {
      var v = parseFloat(maxPriceInput.value) || 0;
      maxPriceInput.value = Math.round((v + currentStep) * 100) / 100;
    };
    if (maxPriceCurrency) {
      maxPriceCurrency.onchange = function() {
        var v = parseFloat(maxPriceInput.value) || 0;
        if (this.value === 'local' && !useLocalCurrency) {
          maxPriceInput.value = Math.round(v * approxExchRate);
          currentStep = localStep;
          useLocalCurrency = true;
        } else if (this.value === 'usd' && useLocalCurrency) {
          maxPriceInput.value = Math.round(v / approxExchRate * 100) / 100;
          currentStep = usdStep;
          useLocalCurrency = false;
        }
      };
    }

    // Voice gender — restore saved preference
    var savedGender = localStorage.getItem('bb_voice_gender') || 'male';
    state.voice = savedGender === 'female' ? 'Kore' : 'Puck';
    document.querySelectorAll('.voice-gender-btn').forEach(function(btn) {
      var isMatch = (btn.dataset.voice === 'Kore' && savedGender === 'female') ||
                    (btn.dataset.voice === 'Puck' && savedGender === 'male');
      if (isMatch) btn.classList.add('active');
      btn.onclick = function() {
        document.querySelectorAll('.voice-gender-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        var gender = btn.dataset.voice === 'Kore' ? 'female' : 'male';
        localStorage.setItem('bb_voice_gender', gender);
        state.voice = btn.dataset.voice;
      };
    });

    document.querySelectorAll('.tone-btn').forEach(function(btn) {
      btn.onclick = function() {
        document.querySelectorAll('.tone-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        state.tone = btn.dataset.tone;
      };
    });

    document.querySelectorAll('.mode-btn').forEach(function(btn) {
      btn.onclick = function() {
        document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        state.mode = btn.dataset.mode;
        document.getElementById('voice-card').style.display = state.mode === 'audio' ? 'block' : 'none';
      };
    });
    document.getElementById('voice-card').style.display = state.mode === 'audio' ? 'block' : 'none';

    document.getElementById('start-neg-btn').onclick = function() {
      var rawVal = parseFloat(document.getElementById('max-price').value) || 0;
      var isLocal = maxPriceCurrency && maxPriceCurrency.value === 'local';
      state.maxPrice = isLocal ? Math.round(rawVal / approxExchRate * 100) / 100 : rawVal;
      showScreen(state.mode === 'text' ? 'text-negotiation' : 'negotiation');
    };
  }

    // ── parse AI response ─────────────────────────────────────────────────
    // Expected format (line-prefixed):
    //   LOCAL: [message in local language]
    //   EN: [English translation]
    //   YES: [local yes phrase]
    //   NO: [local no phrase]
    //   DEAL: [price] [currency]   (optional)
    //   WALKAWAY                   (optional)
    function parseAIResponse(raw) {
      var text = raw || '';
      var deal = null, walkaway = false;

      var dealMatch = text.match(/^DEAL:\s*([^\n]+)/mi);
      if (dealMatch) { deal = dealMatch[1].trim(); }

      if (/^WALKAWAY\s*$/mi.test(text)) { walkaway = true; }

      var localMatch   = text.match(/^LOCAL:\s*(.+?)(?=\n(?:EN|YES|NO|SUGGEST|DEAL|WALKAWAY):|\s*$)/msi);
      var enMatch      = text.match(/^EN:\s*(.+?)(?=\n(?:LOCAL|YES|NO|SUGGEST|DEAL|WALKAWAY):|\s*$)/msi);
      var yesMatch     = text.match(/^YES:\s*(.+)$/mi);
      var noMatch      = text.match(/^NO:\s*(.+)$/mi);
      var suggestMatch = text.match(/^SUGGEST:\s*(.+)$/mi);

      var local       = localMatch   ? localMatch[1].trim()   : '';
      var en          = enMatch      ? enMatch[1].trim()      : '';
      var yesLocal    = yesMatch     ? yesMatch[1].trim()     : '';
      var noLocal     = noMatch      ? noMatch[1].trim()      : '';
      var suggestLocal= suggestMatch ? suggestMatch[1].trim() : '';

      // Fallback: if LOCAL: prefix is missing, use first non-empty line as local text
      if (!local) {
        var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
        local = lines[0] || text.trim();
      }

      return { local: local, en: en, yesLocal: yesLocal, noLocal: noLocal, suggestLocal: suggestLocal, deal: deal, walkaway: walkaway };

      });
    }

    function collapseOldBubbles() {
      document.querySelectorAll('.chat-bubble-active').forEach(function(b) {
        b.classList.remove('chat-bubble-active');
        var local = b.querySelector('.bubble-local');
        var en    = b.querySelector('.bubble-en');
        var btns  = b.querySelector('.merchant-btns');
        if (local) { local.style.fontSize='13px'; local.style.color='var(--muted)'; local.style.marginBottom='0'; local.style.whiteSpace='nowrap'; local.style.overflow='hidden'; local.style.textOverflow='ellipsis'; }
        if (en)   en.style.display = 'none';
        if (btns) btns.style.display = 'none';
        b.style.background = 'transparent';
        b.style.border = '1px solid transparent';
        b.style.padding = '4px 12px';
      });
    }

    function showThinkingSpinner() {
      if (document.getElementById('text-thinking-spinner')) return;
      var el = document.createElement('div');
      el.id = 'text-thinking-spinner';
      el.style.cssText = 'text-align:center;padding:16px;color:var(--muted);font-size:13px;';
      el.textContent = '✦ Responding…';
      chat.appendChild(el);
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function hideThinkingSpinner() {
      var el = document.getElementById('text-thinking-spinner');
      if (el) el.remove();
      var init = document.getElementById('text-thinking');
      if (init) init.remove();
    }

    function doFinish(outcome, price) {
      if (sessionDone) return;
      sessionDone = true;
      state.outcome = outcome;
      state.finalPrice = price;
      state.exchRate = state._exchRate;
      showScreen('result');
    }

    // track latest local phrases as fallback when AI omits them
    var lastSuggestLocal = '';
    var lastYesLocal = '';
    var lastNoLocal = '';

    // ── render AI message bubble ──────────────────────────────────────────
    function renderAIMessage(parsed) {
      hideThinkingSpinner();
      collapseOldBubbles();

      if (parsed.suggestLocal) lastSuggestLocal = parsed.suggestLocal;
      if (parsed.yesLocal)    lastYesLocal    = parsed.yesLocal;
      if (parsed.noLocal)     lastNoLocal     = parsed.noLocal;

      // Use stored phrases as fallback when AI forgets to include them this turn
      var yesPhrase     = parsed.yesLocal     || lastYesLocal;
      var noPhrase      = parsed.noLocal      || lastNoLocal;
      var suggestPhrase = parsed.suggestLocal || lastSuggestLocal;

      var bubble = document.createElement('div');
      bubble.className = 'chat-bubble-active';
      bubble.style.cssText = 'background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:20px 16px 16px;transition:all 0.3s ease;margin-bottom:4px;';

      // Build YES / NO button HTML — local phrase large on top, English subtitle small below
      function merchantBtn(cls, bg, borderColor, textColor, localPhrase, enLabel, icon) {
        return '<button class="' + cls + '" style="background:' + bg + ';border:1.5px solid ' + borderColor + ';border-radius:14px;color:' + textColor + ';padding:16px 8px;cursor:pointer;touch-action:manipulation;text-align:center;font-family:Manrope,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;width:100%;">' +
          (localPhrase ? '<span style="font-size:20px;font-weight:800;line-height:1.2;word-break:break-word;">' + escHtml(localPhrase) + '</span>' : '') +
          '<span style="font-size:10px;font-weight:600;opacity:0.75;letter-spacing:0.02em;">' + icon + ' ' + enLabel + '</span>' +
        '</button>';
      }

      var suggestBtnInner = suggestPhrase
        ? '<span style="display:block;font-size:18px;font-weight:800;margin-bottom:3px;">' + escHtml(suggestPhrase) + '</span><span style="display:block;font-size:10px;color:var(--muted);font-weight:600;">💰 Name my price · Suggest amount</span>'
        : '<span style="font-size:13px;font-weight:700;">💰 Name my price · Suggest amount</span>';

      bubble.innerHTML =
        // ── LOCAL language — big, merchant reads this ──
        '<p class="bubble-local" style="font-size:22px;font-weight:800;color:var(--text);line-height:1.5;margin-bottom:10px;">' + escHtml(parsed.local) + '</p>' +
        // ── English translation — smaller, directly below ──
        (parsed.en
          ? '<p class="bubble-en" style="font-size:13px;color:var(--muted);line-height:1.45;margin-bottom:18px;padding-top:8px;border-top:1px solid var(--border);">🇬🇧 ' + escHtml(parsed.en) + '</p>'
          : '') +
        // ── Merchant response section ──
        (function() {
          var ctaLocal = {
            'Mandarin Chinese':'请点击回应', 'Cantonese':'請撳回應',
            'Thai':'กรุณาเลือก', 'Japanese':'タップして選んでください', 'Korean':'눌러서 선택하세요',
            'Vietnamese':'Nhấn để chọn', 'Indonesian':'Ketuk untuk memilih', 'Malay':'Ketuk untuk pilih',
            'Hindi':'जवाब देने के लिए टैप करें', 'Arabic':'انقر للاختيار', 'Turkish':'Yanıtlamak için dokun',
            'Spanish':'Toca para responder', 'French':'Appuyez pour répondre', 'Portuguese':'Toque para responder',
            'Russian':'Нажмите для ответа', 'German':'Tippen zum Antworten', 'Italian':'Tocca per rispondere'
          }[lang] || '';
          return '<div class="merchant-btns" style="display:flex;flex-direction:column;gap:10px;">' +
            '<p style="font-size:11px;font-weight:700;color:var(--muted);text-align:center;margin-bottom:2px;">' +
              (ctaLocal ? '<span style="font-size:13px;color:var(--text);">' + escHtml(ctaLocal) + '</span><br>' : '') +
              '🏪 Merchant — tap your response' +
            '</p>' +
            '<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">' +
              merchantBtn('merchant-yes','rgba(0,255,136,0.10)','var(--green)','var(--green)', yesPhrase, 'Yes, I can do this', '✅') +
              merchantBtn('merchant-no', 'rgba(255,59,59,0.08)','var(--red)',  'var(--red)',   noPhrase,  "No, can\'t go lower",'❌') +
            '</div>' +
            '<button class="merchant-suggest" style="width:100%;background:rgba(255,107,53,0.08);border:1.5px solid var(--orange);border-radius:14px;color:var(--orange);padding:14px 8px;cursor:pointer;touch-action:manipulation;font-family:Manrope,sans-serif;text-align:center;">' +
              suggestBtnInner +
            '</button>' +
          '</div>';
        })()

      chat.appendChild(bubble);
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });

      bubble.querySelector('.merchant-yes').onclick = function() {
        disableAllMerchantBtns();
        showThinkingSpinner();
        negotiation.send('Merchant agrees and accepts the price.');
      };
      bubble.querySelector('.merchant-no').onclick = function() {
        disableAllMerchantBtns();
        showThinkingSpinner();
        negotiation.send('Merchant refuses — the price is too low for them.');
      };
      bubble.querySelector('.merchant-suggest').onclick = function() {
        var modalLocal = document.getElementById('merchant-modal-local');
        if (modalLocal) modalLocal.textContent = lastSuggestLocal || '';
        var confirmLocal = document.getElementById('merchant-confirm-local');
        if (confirmLocal) confirmLocal.textContent = lastYesLocal ? lastYesLocal + ' ·' : '';
        document.getElementById('merchant-price-modal').style.display = 'flex';
        setTimeout(function() { document.getElementById('merchant-price-input').focus(); }, 80);
      };
    }

    // ── handle AI text ────────────────────────────────────────────────────
    function handleAIText(raw) {
      // Detect model breaking character — retry with a nudge
      var lower = (raw || '').toLowerCase();
      var brokeChar = lower.indexOf('stuck in a loop') !== -1 ||
                      lower.indexOf('seem to be stuck') !== -1 ||
                      lower.indexOf('as an ai') !== -1 ||
                      lower.indexOf("i'm sorry, but") !== -1 ||
                      lower.indexOf('cannot continue') !== -1;
      if (brokeChar) {
        hideThinkingSpinner();
        showThinkingSpinner();
        negotiation.send('Keep negotiating. Do NOT break character. Use the LOCAL/EN/YES/NO/SUGGEST format. Continue the negotiation naturally with a fresh offer or approach.');
        return;
      }

      var parsed = parseAIResponse(raw);
      textTurnCount++;
      renderAIMessage(parsed);

      if (parsed.deal) {
        var num = parseFloat(parsed.deal);
        var usd = (!isNaN(num) && state._exchRate) ? Math.round(num / state._exchRate * 100) / 100 : (isNaN(num) ? null : num);
        updatePriceStatus('Deal agreed! 🤝', parsed.deal, 'var(--green)');
        hideTextActionPopup();
        setTimeout(function() { doFinish('deal', usd); }, 1800);
        return;
      }
      if (parsed.walkaway) {
        hideTextActionPopup();
        setTimeout(function() { doFinish('walkaway', null); }, 1800);
        return;
      }

      // Show deal/walkaway popup after turn 3, with cooldown
      var enoughTurns = textTurnCount >= 3;
      var cooldownOver = textTurnCount >= textPopupDismissedAt + 3;
      if (enoughTurns && cooldownOver) {
        var label = textTurnCount >= 6 ? 'Heard a deal? Or time to walk away?' : 'Getting close? Ready to decide?';
        setTimeout(function() { showTextActionPopup(label); }, 600);
      }
    }

    // ── traveller suggest button → open modal ────────────────────────────
    function closeTravellerModal() { document.getElementById('traveller-price-modal').style.display = 'none'; }
    document.getElementById('traveller-suggest-btn').onclick = function() {
      document.getElementById('traveller-price-modal').style.display = 'flex';
      setTimeout(function() { document.getElementById('traveller-price-input').focus(); }, 80);
    };
    document.getElementById('traveller-price-backdrop').onclick = closeTravellerModal;
    document.getElementById('traveller-price-cancel').onclick   = closeTravellerModal;
    document.getElementById('traveller-price-send').onclick = function() {
      var val = document.getElementById('traveller-price-input').value.trim();
      if (!val || !negotiation) return;
      closeTravellerModal();
      document.getElementById('traveller-price-input').value = '';
      disableAllMerchantBtns();
      hideTextActionPopup();
      showThinkingSpinner();
      updatePriceStatus('Your offer', val + ' ' + (currCode || 'USD'), 'var(--text)');
      negotiation.send('The tourist offers ' + val + ' ' + (currCode || 'USD') + '. Tell the merchant this in ' + lang + ' — say this is the tourist\'s offer.');
    };

    // ── merchant price modal ──────────────────────────────────────────────
    function closeMerchantModal() { document.getElementById('merchant-price-modal').style.display = 'none'; }
    document.getElementById('merchant-price-backdrop').onclick = closeMerchantModal;
    document.getElementById('merchant-price-cancel').onclick   = closeMerchantModal;
    document.getElementById('merchant-price-confirm').onclick  = function() {
      var val = document.getElementById('merchant-price-input').value.trim();
      if (!val || !negotiation) return;
      closeMerchantModal();
      document.getElementById('merchant-price-input').value = '';
      disableAllMerchantBtns();
      hideTextActionPopup();
      showThinkingSpinner();
      updatePriceStatus("Merchant's offer", val + ' ' + (currCode || 'local currency'), 'var(--orange)');
      negotiation.send('Merchant counter-offers at ' + val + ' ' + (currCode || 'local currency') + '. Respond to this new price in ' + lang + '.');
    };

    // ── start ─────────────────────────────────────────────────────────────
    try {
      negotiation = await startTextNegotiation(state, handleAIText);
    } catch(e) {
      hideThinkingSpinner();
      var errEl = document.getElementById('text-thinking') || document.createElement('div');
      errEl.style.cssText = 'text-align:center;padding:20px;color:var(--red);font-size:13px;font-weight:600;';
      errEl.textContent = '❌ ' + e.message;
      if (!errEl.parentNode) chat.appendChild(errEl);
    }
  }

  // ─── SCREEN: RESULT ───────────────────────────────────────────────────────
  function initResultScreen() {
    var container = document.getElementById('screen-result');
    var isDeal = state.outcome === 'deal';

    if (isDeal) {
      var quotedUsd = parseFloat((state.analysis && state.analysis.quoted_price_usd) || 0);
      var finalUsd  = parseFloat(state.finalPrice) || 0;
      var saved     = Math.max(0, quotedUsd - finalUsd).toFixed(2);

      // Use the user-confirmed local price (from the deal overlay) as the primary display
      var localPaid = state.dealLocalPrice && state.dealLocalCurr
        ? state.dealLocalPrice + ' ' + state.dealLocalCurr
        : (state.exchRate && state.currCode && finalUsd)
          ? Math.round(finalUsd * state.exchRate) + ' ' + state.currCode
          : null;

      var paidLine = localPaid
        ? '<div class="price-hero" style="font-size:40px;margin:4px 0;">' + localPaid + '</div>' +
          '<div style="font-size:18px;color:var(--muted);margin-bottom:4px;">≈ $' + finalUsd.toFixed(2) + ' USD</div>'
        : '<div class="price-hero" style="font-size:48px;margin:6px 0;">$' + finalUsd.toFixed(2) + '</div>';

      container.innerHTML =
        '<div style="text-align:center;padding:48px 0 32px;">' +
          '<div style="font-size:72px;line-height:1;margin-bottom:16px;">🤝</div>' +
          '<h1 style="font-size:32px;color:var(--green);margin-bottom:8px;">Deal Closed!</h1>' +
          '<p style="color:var(--muted);font-size:14px;">You negotiated like a local.</p>' +
        '</div>' +

        '<div class="card-accent" style="text-align:center;margin-bottom:14px;">' +
          '<div class="tag">You paid</div>' +
          paidLine +
          '<hr class="divider">' +
          '<div style="display:flex;justify-content:center;gap:32px;">' +
            '<div>' +
              '<div class="tag">You saved</div>' +
              '<div style="font-family:Syne,sans-serif;font-weight:800;font-size:24px;color:var(--green);">$' + saved + '</div>' +
            '</div>' +
            '<div>' +
              '<div class="tag">They asked</div>' +
              '<div style="font-family:Syne,sans-serif;font-weight:700;font-size:24px;color:var(--muted2);text-decoration:line-through;">$' + quotedUsd.toFixed(2) + '</div>' +
            '</div>' +
          '</div>' +
        '</div>' +

        '<p style="font-size:12px;color:var(--muted2);text-align:center;margin-bottom:20px;">' +
          (state.analysis && state.analysis.product_description) + ' · ' + (state.location && state.location.city) +
        '</p>' +

        '<button id="shop-another-btn" class="btn-primary">Shop Another Item →</button>' +
        '<button id="new-loc-btn" class="btn-secondary">Change Location</button>';

      document.getElementById('shop-another-btn').onclick = function() { showScreen('capture'); };
      document.getElementById('new-loc-btn').onclick = function() { showScreen('location'); };
    } else {
      container.innerHTML =
        '<div style="text-align:center;padding:48px 0 32px;">' +
          '<div style="font-size:72px;line-height:1;margin-bottom:16px;">💪</div>' +
          '<h1 style="font-size:32px;margin-bottom:8px;">Budget Held!</h1>' +
          '<p style="color:var(--muted);font-size:14px;line-height:1.6;">Their best offer didn\'t meet your limit.<br>Smart move — another stall awaits.</p>' +
        '</div>' +

        '<button id="try-again-btn" class="btn-primary">Try Again →</button>' +
        '<button id="new-item-btn" class="btn-secondary">New Item</button>' +
        '<button id="new-loc-result-btn" class="btn-secondary">New Location</button>';

      document.getElementById('try-again-btn').onclick = function() { showScreen('preferences'); };
      document.getElementById('new-item-btn').onclick = function() { showScreen('capture'); };
      document.getElementById('new-loc-result-btn').onclick = function() { showScreen('location'); };
    }
  }

  // ─── START ────────────────────────────────────────────────────────────────
  showScreen('location');
  </script>
</body>
</html>
